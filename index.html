  <style>
    :root{

    *{box-sizing:border-box}

<body>
  <div class="app-shell" id="appShell">
    <header class="app-header" id="appHeader"></header>
    <main class="screen" id="screen"></main>
    <button class="fab" id="fab" title="Ação rápida">+</button>
    <div class="speed-overlay" id="speedOverlay"></div>
    <div class="speed-menu" id="speedMenu">
      <button data-quick="ai">IA lançamento</button>
      <button data-quick="expense">Nova Despesa</button>
      <button data-quick="income">Nova Receita</button>
    </div>
    <nav class="bottom-nav" id="bottomNav"></nav>
  </div>
  <div class="overlay" id="modalOverlay"></div>
  <div class="bottom-sheet-overlay" id="sheetOverlay"></div>
  <div class="bottom-sheet" id="filterSheet"></div>
  <div class="toast-wrap" id="toastWrap"></div>
  <div class="save-indicator" id="saveIndicator">✓ Sincronizado localmente</div>

<script>
'use strict';

const KEY = 'neonvault_data_mobile';
const DARK_KEY = 'neonvault_darkMode';
const app = document.getElementById('screen');
const header = document.getElementById('appHeader');
const nav = document.getElementById('bottomNav');
const modalOverlay = document.getElementById('modalOverlay');
const sheetOverlay = document.getElementById('sheetOverlay');
const filterSheet = document.getElementById('filterSheet');
const fab = document.getElementById('fab');
const speedOverlay = document.getElementById('speedOverlay');
const speedMenu = document.getElementById('speedMenu');
const toastWrap = document.getElementById('toastWrap');
const saveIndicator = document.getElementById('saveIndicator');
let deferredInstallPrompt = null;
let saveIndicatorTimer = null;
const APP_VERSION = '1.5.0';
const VERSION_KEY = 'neonvault_installed_version';

const storage = {
  get(key){
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e){ return window.__appData?.[key] ?? null; }
  },
  set(key,val){
    try { localStorage.setItem(key, JSON.stringify(val)); }
    catch(e){ window.__appData = window.__appData || {}; window.__appData[key] = val; }
  },
  rawGet(key){
    try { return localStorage.getItem(key); }
    catch(e){ return window.__appData?.[key] ?? null; }
  },
  rawSet(key,val){
    try { localStorage.setItem(key, val); }
    catch(e){ window.__appData = window.__appData || {}; window.__appData[key] = val; }
  },
  clear(){
    try { localStorage.removeItem(KEY); localStorage.removeItem(DARK_KEY); }
    catch(e){ if(window.__appData){ delete window.__appData[KEY]; delete window.__appData[DARK_KEY]; } }
  }
};

const fmt = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const monthFmt = new Intl.DateTimeFormat('pt-BR',{month:'long',year:'numeric'});
const dateLongFmt = new Intl.DateTimeFormat('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
const monthShortFmt = new Intl.DateTimeFormat('pt-BR',{month:'short'});
const uuid = () => (crypto?.randomUUID ? crypto.randomUUID() : 'id-' + Date.now().toString(36) + Math.random().toString(36).slice(2));

const categoryEmoji = {
  Mercado:'🛒', Transporte:'🚗', Farmácia:'💊', Lazer:'🎮', Delivery:'🍕', Vestuário:'👕', Exercício:'🏋️', Estudos:'📚', Investimento:'📈', Outros:'📦', Fixa:'📌'
};
const investTypes = ['Renda Fixa','Ações','FIIs','Tesouro Direto','Cripto','Outros'];
const investColors = {'Renda Fixa':'#27AE60','Ações':'#2E6DA4','FIIs':'#E67E22','Tesouro Direto':'#1ABC9C','Cripto':'#9B59B6','Outros':'#95A5A6'};

let data = loadData();
let view = 'overview';
let previousView = 'overview';
let budgetSub = 'receita';
let budgetMode = 'table';
let investSub = 'aportes';
let hideValues = false;
let currency = 'BRL';
let expandedRule = true;
let expandedPat = {};
let responsibleFilter = 'Todos';
let filter = { search:'', categories:[], period:'Mês atual' };
let activeDonutSegments = [];
let selectedDonutIndex = -1;
let notifiedGoals = new Set();

function demoData(){
  const currentMonth = new Date().toISOString().slice(0,7);
  const cats = [
    {name:'Mercado',color:'#27AE60',rule:'necessidade'},
    {name:'Transporte',color:'#3498DB',rule:'necessidade'},
    {name:'Farmácia',color:'#E74C3C',rule:'necessidade'},
    {name:'Lazer',color:'#9B59B6',rule:'desejo'},
    {name:'Estudos',color:'#1ABC9C',rule:'desejo'},
    {name:'Delivery',color:'#E67E22',rule:'desejo'},
    {name:'Vestuário',color:'#F39C12',rule:'desejo'},
    {name:'Exercício',color:'#2ECC71',rule:'desejo'},
    {name:'Investimento',color:'#2E6DA4',rule:'investimento'},
    {name:'Outros',color:'#95A5A6',rule:'ignorar'}
  ];
  return {
    version:3,
    appVersion:'1.1.0',
    currentMonth,
    darkMode:true,
    visualTheme:'dark-pro',
    coupleMode:{enabled:false,name1:'Você',name2:'Parceiro(a)'},
    usdRate:5.85,
    transactions:[],
    patrimonio:{
      liquidez:{total:0,items:[]},
      bens:{total:0,items:[]},
      investimentos:{total:0,items:[]},
      dividas:{total:0,items:[]}
    },
    patrimonioHistory:[],
    categories:cats,
    budgetGoals:{},
    incomeTypes:['Renda Principal','Renda Extra','Freelance','Investimento','Outros']
  };
}
function t(type,subtype,date,description,category,value){
  return {id:uuid(),type,subtype,date,description,category,value,month:date.slice(0,7),responsible:'Você',recurring:false,recurringMonths:0};
}
function loadData(){
  const saved = storage.get(KEY);
  if(saved && saved.version){
    migrate(saved);
    return saved;
  }
  const d = demoData(); storage.set(KEY,d); return d;
}
function migrate(d){
  d.version = d.version || 2;
  d.appVersion = d.appVersion || '1.1.0';
  d.currentMonth = d.currentMonth || '2026-06';
  d.visualTheme = d.visualTheme || 'black';
  d.coupleMode = d.coupleMode || {enabled:false,name1:'Você',name2:'Parceiro(a)'};
  d.usdRate = d.usdRate || 5.85;
  d.transactions = d.transactions || [];
  d.categories = Array.isArray(d.categories) ? d.categories.map(c => typeof c==='string'?{name:c,color:'#95A5A6',rule:'ignorar'}:c) : demoData().categories;
  d.incomeTypes = d.incomeTypes || ['Renda Principal','Renda Extra','Freelance','Investimento','Outros'];
  d.budgetGoals = d.budgetGoals || {};
  d.patrimonio = d.patrimonio || demoData().patrimonio;
  ['liquidez','bens','investimentos','dividas'].forEach(k=>{
    if(typeof d.patrimonio[k] === 'number') d.patrimonio[k] = {total:d.patrimonio[k],items:[]};
    d.patrimonio[k].items = d.patrimonio[k].items || [];
    d.patrimonio[k].total = Number(d.patrimonio[k].total || 0);
  });
  d.patrimonioHistory = d.patrimonioHistory || [];
}
function save(){
  data.appVersion = APP_VERSION;
  data.darkMode = document.body.classList.contains('dark');
  storage.set(KEY,data);
  storage.rawSet(DARK_KEY, data.darkMode ? 'true':'false');
  markSaved();
}
function markSaved(){
  if(!saveIndicator) return;
  saveIndicator.classList.add('show');
  clearTimeout(saveIndicatorTimer);
  saveIndicatorTimer = setTimeout(()=>saveIndicator.classList.remove('show'), 1100);
}
function applyDark(){
  const theme = data.visualTheme || 'black';
  document.body.classList.add('dark');
  document.body.classList.toggle('theme-black', theme === 'black');
  document.body.classList.toggle('theme-neon', theme === 'neon');
  data.darkMode = true;
}
function currentDate(){ return new Date().toISOString().slice(0,10); }
function dateFromMonth(m){ const [y,mo]=m.split('-').map(Number); return new Date(y,mo-1,1); }
function addMonths(month,delta){ const d = dateFromMonth(month); d.setMonth(d.getMonth()+delta); return d.toISOString().slice(0,7); }
function monthHuman(m){ const s = monthFmt.format(dateFromMonth(m)); return s.charAt(0).toUpperCase()+s.slice(1); }
function monthAbbr(m){ return monthShortFmt.format(dateFromMonth(m)).replace('.','').slice(0,3).replace(/^./,c=>c.toUpperCase()); }
function brDate(date){ const [y,m,d]=date.split('-'); return `${d}/${m}`; }
function brDateFull(date){ return dateLongFmt.format(new Date(date+'T12:00:00')); }
function money(v, opts={}){
  if(hideValues) return '<span class="hidden-money">••••••</span>';
  const abs = Math.abs(Number(v)||0);
  let out = fmt.format(abs);
  if(opts.usd){ out = 'US$ ' + (abs / (data.usdRate || 5.85)).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  if(opts.sign === 'neg') return '−' + out;
  if(opts.sign === 'pos') return '+' + out;
  if(Number(v)<0) return '−' + out;
  return out;
}
function parseMoney(str){
  if(typeof str === 'number') return str;
  const cleaned = String(str||'').replace(/[^\d,-]/g,'').replace(/\./g,'').replace(',','.');
  return Number(cleaned) || 0;
}
function maskMoneyInput(input){
  let digits = input.value.replace(/\D/g,'');
  if(!digits) { input.value=''; return; }
  const num = Number(digits) / 100;
  input.value = fmt.format(num);
}
function categoryObj(name){
  const c = data.categories.find(c=>c.name===name);
  if(c) return c;
  if(investColors[name]) return {name, color:investColors[name], rule:'investimento'};
  if(data.incomeTypes.includes(name)) return {name, color: name==='Renda Principal'?'#27AE60': name==='Renda Extra'?'#3498DB': name==='Freelance'?'#9B59B6':'#95A5A6', rule:'ignorar'};
  return {name, color:'#95A5A6', rule:'ignorar'};
}
function badge(name){
  const c = categoryObj(name);
  const bg = hexToRgba(c.color,.15);
  const icon = categoryEmoji[name] ? categoryEmoji[name] + ' ' : '';
  return `<span class="badge" style="background:${bg};color:${c.color}">${icon}${escapeHtml(name)}</span>`;
}
function hexToRgba(hex,alpha){
  const h=String(hex||'#95A5A6').replace('#','');
  const bigint=parseInt(h.length===3?h.split('').map(x=>x+x).join(''):h,16);
  const r=(bigint>>16)&255,g=(bigint>>8)&255,b=bigint&255;
  return `rgba(${r},${g},${b},${alpha})`;
}
function escapeHtml(s){ return String(s??'').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
function sum(list){ return list.reduce((a,b)=>a+Number(b.value||0),0); }
function monthTx(month=data.currentMonth){ return data.transactions.filter(x=>x.month===month); }
function expenses(tx=monthTx()){ return tx.filter(x=>x.type==='despesa' && (x.subtype==='fixa'||x.subtype==='variavel')); }
function variableExpenses(tx=monthTx()){ return tx.filter(x=>x.type==='despesa' && x.subtype==='variavel'); }
function fixedExpenses(tx=monthTx()){ return tx.filter(x=>x.type==='despesa' && x.subtype==='fixa'); }
function incomes(tx=monthTx()){ return tx.filter(x=>x.type==='receita'); }
function aportes(tx=monthTx()){ return tx.filter(x=>x.subtype==='aporte'); }
function totals(month=data.currentMonth){
  const tx = monthTx(month);
  const receita = sum(incomes(tx));
  const despesa = sum(expenses(tx));
  const investir = sum(aportes(tx));
  return {receita,despesa,investir,saldo:receita-despesa};
}
function patrimonioTotal(){
  const p=data.patrimonio; return Number(p.liquidez.total||0)+Number(p.bens.total||0)+Number(p.investimentos.total||0)-Number(p.dividas.total||0);
}
function savePatrimonioSnapshot(month=data.currentMonth){
  const total = patrimonioTotal();
  const existing = data.patrimonioHistory.find(h=>h.month===month);
  if(existing) existing.total = total;
  else data.patrimonioHistory.push({month,total});
  data.patrimonioHistory.sort((a,b)=>a.month.localeCompare(b.month));
  save();
}

function render(){
  applyDark();
  savePatrimonioSnapshot(data.currentMonth);
  renderHeader();
  renderNav();
  closeSpeed(false);
  if(view==='overview') renderOverview();
  if(view==='budget') renderBudget();
  if(view==='investments') renderInvestments();
  if(view==='patrimonio') renderPatrimonio();
  if(view==='settings') renderSettings();
}
function renderHeader(){
  header.innerHTML = `
    <div class="logo">${upcashLogoHtml()}<span class="brand-name upcash-word">Up<span>cash</span></span></div>
    <div class="month-pill"><button id="prevMonth" aria-label="Mês anterior">‹</button><span class="month-label">${monthHuman(data.currentMonth)}</span><button id="nextMonth" aria-label="Próximo mês">›</button></div>
    <button class="settings-btn" id="settingsBtn" title="Configurações">⚙</button>`;
  document.getElementById('prevMonth').onclick=()=>{ data.currentMonth=addMonths(data.currentMonth,-1); savePatrimonioSnapshot(data.currentMonth); save(); render(); };
  document.getElementById('nextMonth').onclick=()=>{ data.currentMonth=addMonths(data.currentMonth,1); savePatrimonioSnapshot(data.currentMonth); save(); render(); };
  document.getElementById('settingsBtn').onclick=()=>{ if(view!=='settings') previousView=view; view='settings'; render(); };
}
function renderNav(){
  const items = [
    ['overview','◻','Visão geral'],['budget','⇄','Orçamento'],['investments','↗','Investimentos'],['patrimonio','◈','Patrimônio'],['logout','→','Sair']
  ];
  nav.innerHTML = items.map(([id,ic,lab])=>`<button class="nav-item ${view===id?'active':''}" data-nav="${id}"><span>${ic}</span>${lab}</button>`).join('');
  nav.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{
    const id = btn.dataset.nav;
    if(id==='logout') return logout();
    if(view!=='settings') previousView=id;
    view=id; render();
  });
}
function title(title){ return `<div class="screen-title"><h1>${title}</h1><button class="icon-btn eye" id="eyeToggle">${hideValues?'🙈':'👁'}</button></div>`; }
function bindEye(){ const e=document.getElementById('eyeToggle'); if(e) e.onclick=()=>{ hideValues=!hideValues; render(); }; }
function summaryGrid(){
  const t = totals();
  return `<div class="summary-grid">
    <div class="summary-card income"><div class="label">RECEITA</div><div class="value">${money(t.receita)}</div></div>
    <div class="summary-card invest"><div class="label">INVESTIR <span class="mini-toggle"><i></i></span></div><div class="value">${money(t.investir)}</div></div>
    <div class="summary-card expense"><div class="label">DESPESAS</div><div class="value">${money(t.despesa)}</div></div>
    <div class="summary-card balance ${t.saldo>=0?'positive':'negative'}"><div class="label">SALDO</div><div class="value">${money(t.saldo)}</div></div>
  </div>`;
}
function responsibleFilterHtml(){
  if(!data.coupleMode.enabled) return '';
  const names = ['Todos', data.coupleMode.name1 || 'Você', data.coupleMode.name2 || 'Parceiro(a)'];
  return `<div class="segment">${names.map(n=>`<button class="${responsibleFilter===n?'active':''}" data-resp="${escapeHtml(n)}">${escapeHtml(n)}</button>`).join('')}</div>`;
}
function bindResponsibleFilter(){
  document.querySelectorAll('[data-resp]').forEach(b=>b.onclick=()=>{ responsibleFilter=b.dataset.resp; render(); });
}
function applyResponsible(list){ return data.coupleMode.enabled && responsibleFilter!=='Todos' ? list.filter(x=>x.responsible===responsibleFilter) : list; }

  const today = currentDate();
  const todaySpent = sum(data.transactions.filter(x=>x.type==='despesa' && (x.subtype==='fixa'||x.subtype==='variavel') && x.date===today));
  const recent = applyResponsible(monthTx().filter(x=>x.type==='receita' || x.subtype==='fixa' || x.subtype==='variavel')).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  app.innerHTML = title('Visão Geral') + responsibleFilterHtml() + summaryGrid() + `
    <div class="card special-card">
      <div class="emoji">💸</div><div><h3>Gasto de hoje · ${brDateFull(today)}</h3><strong>${money(todaySpent)}</strong></div>
    </div>
    <div class="card section-card">
      <div class="section-head"><h2>Comparativo mês a mês</h2><span class="muted" style="font-size:12px;font-weight:800">Últimos 6 meses</span></div>
      <div class="chart-wrap small"><canvas id="monthlyBars"></canvas><div class="chart-tooltip" id="barTip"></div></div>
    </div>
    ${data.coupleMode.enabled ? `<div class="card section-card"><div class="section-head"><h2>Gastos por pessoa</h2></div><div class="chart-wrap small"><canvas id="couplePie"></canvas><div class="chart-tooltip" id="coupleTip"></div></div></div>`:''}
    <div class="card section-card">
      <div class="section-head"><h2>Transações recentes</h2><button class="link" id="seeAll">Ver todas →</button></div>
      ${txList(recent)}
    </div>

  document.getElementById('seeAll').onclick=()=>{ view='budget'; render(); };
  setTimeout(()=>{ drawMonthlyBars(); if(data.coupleMode.enabled) drawCouplePie(); },0);
}
function ruleCard(){
  const inc = totals().receita;
  const tx = expenses(monthTx()).concat(aportes(monthTx()));
  const groups = {
    necessidade:{label:'🔴 Necessidades',pct:.5,color:'#E74C3C',spent:0},
    desejo:{label:'🟡 Desejos',pct:.3,color:'#F39C12',spent:0},
    investimento:{label:'🟢 Investimentos/Poupança',pct:.2,color:'#27AE60',spent:0}
  };
  tx.forEach(x=>{
    const rule = x.subtype==='fixa' ? 'necessidade' : categoryObj(x.category).rule;
    if(groups[rule]) groups[rule].spent += Number(x.value||0);
  });
  return `<div class="card section-card rule-card ${expandedRule?'expanded':''}" id="ruleCard">
    <div class="rule-title"><h2>Regra 50/30/20</h2><span>${expandedRule?'⌃':'⌄'}</span></div>
    <div class="rule-content">
      ${Object.values(groups).map(g=>{
        const limit = inc*g.pct; const pct = limit? (g.spent/limit*100) : 0; const cls=pct>=100?'red':pct>=80?'yellow':'green';
        return `<div class="progress-line"><div class="progress-top"><span>${g.label}</span><span>${money(g.spent)} de ${money(limit)} (${Math.round(pct)}%)</span></div><div class="progress-track"><div class="progress-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div></div>`;
      }).join('')}
      <button class="link" id="adjustRules">Ajustar classificações →</button>
    </div>
  </div>`;
}
function txList(list, empty='Nenhum lançamento encontrado neste período.'){
  if(!list.length) return `<div class="empty">${empty}</div>`;
  return `<div class="transaction-list">${list.map(x=>txRow(x)).join('')}</div>`;
}
function txRow(x){
  let valClass = x.type==='receita' ? 'income' : x.subtype==='aporte' ? 'invest' : 'expense';
  let sign = x.type==='receita' ? 'pos' : x.subtype==='aporte' ? undefined : 'neg';
  return `<div class="tx" data-id="${x.id}">
    <div class="tx-date">${brDate(x.date)}</div>
    <div><div class="tx-name">${escapeHtml(x.description)}</div><div class="tx-meta">${badge(x.category)}${data.coupleMode.enabled?personBadge(x.responsible):''}</div></div>
    <div class="tx-value ${valClass}">${money(x.value,{sign})}</div>
    <button class="edit-btn" data-edit="${x.id}">✏</button>
  </div>`;
}
function personBadge(name){
  const is2 = name === (data.coupleMode.name2 || 'Parceiro(a)');
  return `<span class="person-badge ${is2?'p2':''}">${escapeHtml(name||'Você')}</span>`;
}
function bindEditButtons(){
  document.querySelectorAll('[data-edit]').forEach(btn=>btn.onclick=()=>{
    const tx = data.transactions.find(x=>x.id===btn.dataset.edit);
    if(!tx) return;
    if(tx.subtype==='aporte') return showAporteModal(tx);
    showTransactionModal(tx.type, tx.subtype, tx);
  });
}

  app.innerHTML = title('Orçamento') + responsibleFilterHtml() + summaryGrid() + `
    <div class="segment"><button class="${budgetMode==='table'?'active':''}" data-mode="table">📋 Tabela</button><button class="${budgetMode==='chart'?'active':''}" data-mode="chart">📊 Gráfico</button></div>

    <div id="budgetContent"></div>`;
  bindEye(); bindResponsibleFilter();

  document.querySelectorAll('[data-sub]').forEach(b=>b.onclick=()=>{ budgetSub=b.dataset.sub; renderBudget(); });

function filteredTxForBudget(){
  let list = budgetSub==='receita' ? incomes(monthTx()) : budgetSub==='fixa' ? fixedExpenses(monthTx()) : variableExpenses(monthTx());
  list = applyResponsible(list);
  if(filter.period !== 'Mês atual') list = budgetSub==='receita' ? incomes(data.transactions) : budgetSub==='fixa' ? fixedExpenses(data.transactions) : variableExpenses(data.transactions);
  list = applyPeriod(list);
  if(data.coupleMode.enabled && responsibleFilter!=='Todos') list = list.filter(x=>x.responsible===responsibleFilter);
  if(filter.search) list = list.filter(x=>x.description.toLowerCase().includes(filter.search.toLowerCase()));
  if(filter.categories.length) list = list.filter(x=>filter.categories.includes(x.category));
  return list.sort((a,b)=>b.date.localeCompare(a.date));
}
function applyPeriod(list){
  const nowM = data.currentMonth;
  if(filter.period==='Mês atual') return list.filter(x=>x.month===nowM);
  if(filter.period==='Mês anterior') return list.filter(x=>x.month===addMonths(nowM,-1));
  const now = dateFromMonth(nowM); const start = new Date(now);
  if(filter.period==='Últimos 30 dias'){ const d=new Date(); d.setDate(d.getDate()-30); return list.filter(x=>new Date(x.date+'T12:00:00')>=d); }
  if(filter.period==='Último semestre'){ start.setMonth(start.getMonth()-5); const s=start.toISOString().slice(0,7); return list.filter(x=>x.month>=s && x.month<=nowM); }
  if(filter.period==='Ano atual'){ const y=nowM.slice(0,4); return list.filter(x=>x.month.startsWith(y)); }
  if(filter.period==='Ano passado'){ const y=String(Number(nowM.slice(0,4))-1); return list.filter(x=>x.month.startsWith(y)); }
  return list;
}
function filterChips(){
  const arr=[];
  if(filter.search) arr.push({k:'search',t:`Busca: ${filter.search}`});
  filter.categories.forEach(c=>arr.push({k:'cat:'+c,t:c}));
  if(filter.period !== 'Mês atual') arr.push({k:'period',t:filter.period});
  if(!arr.length) return '';
  return `<div class="filter-chips">${arr.map(x=>`<button class="chip active" data-remove-filter="${escapeHtml(x.k)}">${escapeHtml(x.t)} ×</button>`).join('')}</div>`;
}
function renderBudgetContent(){
  const el = document.getElementById('budgetContent');
  const list = filteredTxForBudget();
  const title = budgetSub==='receita'?'Receitas':budgetSub==='fixa'?'Despesas fixas':'Despesas variáveis';

  el.innerHTML = `<div class="card section-card">
    <div class="action-row"><h2 style="margin:0;font-size:16px">${title}</h2><div><button class="btn ghost small" id="filterBtn">≡ Filtro</button> <button class="btn primary small" id="addBudgetBtn">${addLabel}</button></div></div>
    ${filterChips()}
    ${budgetSub==='variavel'?goalsCompact():''}
    ${budgetMode==='chart' && budgetSub!=='receita' ? chartBudget(list) : tableBudget(list,totalLabel,totalClass)}
    ${filterSummary(list)}
  </div>`;
  document.getElementById('filterBtn').onclick=openFilterSheet;
  document.getElementById('addBudgetBtn').onclick=()=>{
    if(budgetSub==='receita') showTransactionModal('receita',null);
    else showTransactionModal('despesa',budgetSub==='fixa'?'fixa':'variavel');
  };

  bindEditButtons();
  if(budgetMode==='chart' && budgetSub!=='receita') setTimeout(()=>drawDonut(list,'budgetDonut'),0);
}
function tableBudget(list,totalLabel,totalClass){
  return `${txList(list)}<div class="total-row"><span>${totalLabel}</span><span class="${totalClass}">${budgetSub==='receita'?money(sum(list),{sign:'pos'}):money(sum(list),{sign:'neg'})}</span></div>${budgetSub==='receita'?forecastHtml():''}`;
}
function forecastHtml(){
  const months = [...new Set(data.transactions.filter(x=>x.type==='receita' && x.month<data.currentMonth).map(x=>x.month))].sort().reverse().slice(0,3);
  const avg = months.length ? months.reduce((a,m)=>a+sum(incomes(monthTx(m))),0)/months.length : 0;
  const cur = totals().receita;
  const trend = cur >= avg ? `<span class="up">↑ Acima da média</span>` : `<span class="down">⚠ Abaixo da média</span>`;
  return `<div class="forecast">Média dos últimos 3 meses: <strong>${money(avg)}</strong><br>${avg?trend:'Sem histórico suficiente'}</div>`;
}
function goalsCompact(){
  const goals = Object.entries(data.budgetGoals).filter(([,v])=>Number(v)>0);
  if(!goals.length) return '';
  const tx = variableExpenses(monthTx());
  return `<div style="margin:8px 0 12px">${goals.map(([cat,goal])=>{
    const spent = sum(tx.filter(x=>x.category===cat)); const pct = goal?spent/goal*100:0; const cls=pct>=100?'red':pct>=80?'yellow':'green';
    return `<div class="progress-line"><div class="progress-top"><span>${escapeHtml(cat)}: ${money(spent)} / ${money(goal)} (${Math.round(pct)}%)</span></div><div class="progress-track"><div class="progress-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div></div>`;
  }).join('')}</div>`;
}
function chartBudget(list){
  return `<div class="chart-wrap"><canvas id="budgetDonut"></canvas><div class="chart-tooltip" id="donutTip"></div></div><div class="legend" id="budgetLegend"></div><button class="btn ghost full" id="manageCats" style="margin-top:12px">Gerenciar categorias</button>`;
}
function filterSummary(list){
  const active = filter.search || filter.categories.length || filter.period!=='Mês atual';
  if(!active || budgetSub==='receita') return '';
  const groups = groupByCategory(list);
  const total = Object.values(groups).reduce((a,b)=>a+b,0);
  if(!total) return '';
  return `<div style="margin-top:14px;border-top:1px solid var(--borda);padding-top:12px"><h2 style="font-size:14px;margin:0 0 8px">Resumo por categoria</h2>${Object.entries(groups).map(([cat,val])=>{
    const pct = val/total*100; const c=categoryObj(cat).color;
    return `<div class="progress-line"><div class="progress-top"><span>${badge(cat)}</span><span>${money(val,{sign:'neg'})}</span></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${c}"></div></div></div>`;
  }).join('')}</div>`;
}
function groupByCategory(list){ return list.reduce((o,x)=>{ o[x.category]=(o[x.category]||0)+Number(x.value||0); return o; },{}); }
function removeFilter(k){
  if(k==='search') filter.search='';
  else if(k==='period') filter.period='Mês atual';
  else if(k.startsWith('cat:')) filter.categories=filter.categories.filter(c=>c!==k.slice(4));
  renderBudget();
}

function renderInvestContent(){
  const el = document.getElementById('investContent');
  if(investSub==='aportes'){
    const list = aportes(monthTx()).sort((a,b)=>b.date.localeCompare(a.date));
    el.innerHTML = `<div class="card section-card"><div class="action-row"><h2 style="margin:0;font-size:16px">Aportes do mês</h2><button class="btn primary small" id="addAporte">+ Adicionar aporte</button></div>${txList(list,'Nenhum aporte neste mês.')}
    <div class="total-row"><span>Total de aportes</span><span class="invest">${money(sum(list))}</span></div></div>`;
    document.getElementById('addAporte').onclick=()=>showAporteModal(); bindEditButtons();
  } else if(investSub==='rentabilidade'){
    const series = investmentSeries();
    const groups = groupByCategory(data.transactions.filter(x=>x.subtype==='aporte'));
    const total = Object.values(groups).reduce((a,b)=>a+b,0);
    el.innerHTML = `<div class="card section-card"><div class="section-head"><h2>Evolução do total investido</h2></div><div class="chart-wrap"><canvas id="investLine"></canvas><div class="chart-tooltip" id="investTip"></div></div><div class="legend">${Object.entries(groups).map(([cat,val])=>`<div class="legend-item"><span><span class="dot" style="background:${investColors[cat]||'#95A5A6'}"></span>${escapeHtml(cat)}</span><span>${total?Math.round(val/total*100):0}% · ${money(val)}</span></div>`).join('')||'<div class="empty">Sem aportes ainda.</div>'}</div></div>`;
    setTimeout(()=>drawLine('investLine',series,'investTip'),0);
  } else {
    const avg = averageMonthlyAporte();
    const pv = patrimonioTotal();
    el.innerHTML = `<div class="card section-card"><h2 style="margin-top:0">Simulador de Independência Financeira</h2>
      <div class="field"><label>Patrimônio atual</label><input id="simPV" inputmode="decimal" value="${fmt.format(pv)}"></div>
      <div class="field"><label>Aporte mensal</label><input id="simPMT" inputmode="decimal" value="${fmt.format(avg)}"></div>
      <div class="field"><label>Taxa de juros anual (%)</label><input id="simRate" type="number" step="0.1" value="8"></div>
      <div class="field"><label>Meta de patrimônio</label><input id="simGoal" inputmode="decimal" value="${fmt.format(3000000)}"></div>
      <div class="card" style="box-shadow:none;margin:12px 0;background:rgba(30,123,75,.08)"><div class="muted" style="font-size:12px;font-weight:900">Você atingirá sua meta em</div><div id="simResult" style="font-size:21px;font-weight:900;margin-top:6px"></div><div id="simValue" class="small-note"></div></div>
      <div class="chart-wrap"><canvas id="simLine"></canvas><div class="chart-tooltip" id="simTip"></div></div>
    </div>`;
    ['simPV','simPMT','simGoal'].forEach(id=>document.getElementById(id).addEventListener('input',e=>{ maskMoneyInput(e.target); updateSimulator(); }));
    document.getElementById('simRate').addEventListener('input',updateSimulator); updateSimulator();
  }
}
function investmentSeries(){
  const months = [...new Set(data.transactions.filter(x=>x.subtype==='aporte').map(x=>x.month).concat(data.patrimonioHistory.map(h=>h.month)))].sort().slice(-8);
  let base = Math.max(0,(data.patrimonio.investimentos.total || 0) - sum(data.transactions.filter(x=>x.subtype==='aporte' && x.month>months[0])));
  let running = 0;
  return months.map(m=>{ running += sum(data.transactions.filter(x=>x.subtype==='aporte' && x.month===m)); return {label:monthAbbr(m), value:Math.max(0,base + running)}; });
}
function averageMonthlyAporte(){
  const groups = data.transactions.filter(x=>x.subtype==='aporte').reduce((o,x)=>{o[x.month]=(o[x.month]||0)+x.value;return o;},{});
  const vals=Object.values(groups); return vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
}
function updateSimulator(){
  const pv=parseMoney(document.getElementById('simPV').value), pmt=parseMoney(document.getElementById('simPMT').value), annual=(Number(document.getElementById('simRate').value)||0)/100, goal=parseMoney(document.getElementById('simGoal').value);
  const r=Math.pow(1+annual,1/12)-1;
  let n=0, fv=pv; const points=[];
  while(fv<goal && n<720){
    fv = r===0 ? fv+pmt : fv*(1+r)+pmt;
    n++;
    if(n%12===0 || fv>=goal) points.push({label:String(Math.ceil(n/12))+'a',value:fv});
  }
  const y=Math.floor(n/12), m=n%12;
  document.getElementById('simResult').textContent = `${y} anos e ${m} meses`;
  document.getElementById('simValue').innerHTML = `com patrimônio estimado de <strong>${money(fv)}</strong>`;
  drawLine('simLine',points.length?points:[{label:'Hoje',value:pv},{label:'Meta',value:goal}],'simTip');
}

function patCard(key,icon,label,color){
  const p=data.patrimonio[key]; const open=expandedPat[key];
  return `<div class="pat-card ${open?'open':''}" data-pat="${key}"><div class="pat-row"><div class="pat-ico" style="background:${hexToRgba(color,.13)};color:${color}">${icon}</div><div class="pat-info"><div class="label">${label}</div><div class="value" style="color:${color}">${money(p.total,{usd:currency==='USD'})}</div></div><span class="muted">${open?'⌃':'⌄'}</span></div>
    <div class="pat-items">
      ${p.items.length?p.items.map(it=>`<div class="item-row"><span>${escapeHtml(it.name)} ${it.extra?`<span class="muted">· ${escapeHtml(it.extra)}</span>`:''}</span><span class="nowrap">${money(it.value,{usd:currency==='USD'})} <button class="edit-btn" data-cat="${key}" data-edit-item="${it.id}">✏</button><button class="trash-btn" data-cat="${key}" data-del-item="${it.id}">🗑</button></span></div>`).join(''):'<div class="empty">Sem itens detalhados.</div>'}
      <button class="btn ghost full" data-add-item="${key}" style="margin-top:10px">+ Adicionar item</button>
    </div></div>`;
}
function recomputePat(key){
  const obj=data.patrimonio[key];
  if(obj.items.length) obj.total = obj.items.reduce((a,b)=>a+Number(b.value||0),0);
  savePatrimonioSnapshot(); save();
}
function deletePatItem(cat,id){
  if(!confirm('Excluir este item?')) return;
  data.patrimonio[cat].items = data.patrimonio[cat].items.filter(i=>i.id!==id);
  recomputePat(cat); toast('Item excluído'); renderPatrimonio();
}

function renderSettings(){

function deleteCategory(name){
  if(data.transactions.some(x=>x.category===name)) return toast('Não é possível excluir: há transações vinculadas','error');

  data.categories=data.categories.filter(c=>c.name!==name); delete data.budgetGoals[name]; save(); toast('Categoria excluída'); renderSettings();
}

function showTransactionModal(type, subtype=null, tx=null){
  const isIncome = type==='receita';
  const isFixed = subtype==='fixa';
  const title = tx ? 'Editar lançamento' : isIncome ? 'Nova Receita' : isFixed ? 'Nova Despesa Fixa' : 'Nova Despesa Variável';
  const desc = tx?.description || '';
  const date = tx?.date || (data.currentMonth===currentDate().slice(0,7)?currentDate():data.currentMonth+'-01');

  openModal(`<h2>${title}</h2><p class="sub">Lançamento deste mês.</p>

      <div class="field"><label>Data</label><input id="txDate" type="date" value="${date}"><div class="error" data-err="txDate"></div></div>
      <div class="field auto-wrap"><label>Descrição</label><input id="txDesc" autocomplete="off" value="${escapeHtml(desc)}" placeholder="Ex: Mercado"><div class="autocomplete" id="autoBox"></div><div class="error" data-err="txDesc"></div></div>
      <div class="field"><label>${isIncome?'Tipo de renda':'Categoria'}</label><select id="txCat">${opts.map(o=>`<option value="${escapeHtml(o)}" ${selected===o?'selected':''}>${escapeHtml(o)}</option>`).join('')}</select></div>
      ${isFixed?`<div class="field"><label>Dia do vencimento</label><input id="txDue" type="number" min="1" max="31" value="${tx?.dueDay||5}"></div>`:''}
      ${!tx ? `<div class="toggle-row" style="margin-bottom:12px"><div><strong>Recorrente?</strong><div class="small-note">Cria lançamentos nos próximos meses.</div></div><button type="button" class="toggle ${isFixed?'active':''}" id="txRecurring" ${isFixed?'data-forced="1"':''}></button></div><div class="field" id="recMonthsWrap" style="display:${isFixed?'block':'none'}"><label>Repetir por X meses</label><input id="txRecMonths" type="number" min="1" max="60" value="${isFixed?12:1}"></div>`:''}
      ${data.coupleMode.enabled?`<div class="field"><label>Responsável</label><select id="txResp"><option ${tx?.responsible===(data.coupleMode.name1||'Você')?'selected':''}>${escapeHtml(data.coupleMode.name1||'Você')}</option><option ${tx?.responsible===(data.coupleMode.name2||'Parceiro(a)')?'selected':''}>${escapeHtml(data.coupleMode.name2||'Parceiro(a)')}</option></select></div>`:''}
      <div class="field"><label>Valor</label><input id="txValue" inputmode="decimal" placeholder="R$ 0,00" value="${value}"><div class="error" data-err="txValue"></div></div>
      <div class="modal-actions">${tx?'<button type="button" class="btn danger" id="deleteTx">Excluir</button>':''}<button type="button" class="btn ghost" data-close>Cancelar</button><button class="btn primary" id="saveTx" disabled>${tx?'Salvar':'Adicionar'}</button></div>
    </form>`);
  const form=document.getElementById('txForm'), val=document.getElementById('txValue'), rec=document.getElementById('txRecurring');
  val.addEventListener('input',()=>{ maskMoneyInput(val); validateTxForm(); });
  ['txDate','txDesc'].forEach(id=>document.getElementById(id).addEventListener('input',validateTxForm));
  if(rec) rec.onclick=()=>{ if(rec.dataset.forced==='1') return; rec.classList.toggle('active'); document.getElementById('recMonthsWrap').style.display=rec.classList.contains('active')?'block':'none'; };
  setupAutocomplete(document.getElementById('txDesc'));
  function validateTxForm(){
    const okDate=!!document.getElementById('txDate').value;
    const okDesc=document.getElementById('txDesc').value.trim().length>=2;
    const okVal=parseMoney(val.value)>0;
    setErr('txDate',okDate?'':'Informe a data'); setErr('txDesc',okDesc?'':'Mínimo 2 caracteres'); setErr('txValue',okVal?'':'Informe valor maior que zero');
    document.getElementById('saveTx').disabled=!(okDate&&okDesc&&okVal);
  }
  validateTxForm();
  form.onsubmit=(e)=>{ e.preventDefault(); if(document.getElementById('saveTx').disabled) return; const base={
      id: tx?.id || uuid(), type, subtype, date:document.getElementById('txDate').value, description:document.getElementById('txDesc').value.trim(), category:document.getElementById('txCat').value, value:parseMoney(val.value), month:document.getElementById('txDate').value.slice(0,7), responsible:data.coupleMode.enabled?document.getElementById('txResp').value:'Você', recurring: tx?.recurring || false, recurringMonths: tx?.recurringMonths || 0
    };
    if(isFixed) base.dueDay=Number(document.getElementById('txDue').value)||1;
    if(tx) updateTransaction(tx,base); else addTransaction(base, rec?.classList.contains('active') || false, Number(document.getElementById('txRecMonths')?.value||1));
    closeModal(); render(); toast(isIncome?'Receita salva':'Despesa salva'); if(type==='despesa') checkGoalNotifications(base.category);
  };
  if(tx) document.getElementById('deleteTx').onclick=()=>deleteTransaction(tx);
}
function addTransaction(base, recurring, months){
  const groupId = recurring ? uuid() : null;
  if(recurring){ base.recurring=true; base.recurringGroupId=groupId; base.recurringMonths=months; }
  data.transactions.push(base);
  if(recurring && months>1){
    for(let i=1;i<months;i++){
      const copy={...base,id:uuid(),date:addMonths(base.month,i)+'-'+base.date.slice(8,10),month:addMonths(base.month,i),recurringGroupId:groupId};
      data.transactions.push(copy);
    }
  }
  save();
}
function updateTransaction(oldTx, base){
  const group=oldTx.recurringGroupId;
  if(group && confirm('Este lançamento é recorrente. Aplicar alteração neste mês e nos próximos?')){
    data.transactions = data.transactions.map(x=> x.recurringGroupId===group && x.month>=oldTx.month ? {...x, description:base.description, category:base.category, value:base.value, responsible:base.responsible, dueDay:base.dueDay??x.dueDay} : x);
  } else {
    const idx=data.transactions.findIndex(x=>x.id===oldTx.id); if(idx>=0) data.transactions[idx]={...oldTx,...base};
  }
  save();
}
function deleteTransaction(tx){
  let delGroup=false;
  if(tx.recurringGroupId) delGroup=confirm('Excluir este e os próximos lançamentos recorrentes? Cancelar = somente este mês.');
  if(!tx.recurringGroupId || !delGroup){ if(!confirm('Excluir este lançamento?')) return; data.transactions=data.transactions.filter(x=>x.id!==tx.id); }
  else data.transactions=data.transactions.filter(x=>!(x.recurringGroupId===tx.recurringGroupId && x.month>=tx.month));
  closeModal(); save(); render(); toast('Lançamento excluído');
}

function openModal(html){
  modalOverlay.innerHTML = `<div class="modal-card"><button class="close-modal" data-close>×</button>${html}</div>`;
  modalOverlay.classList.add('show'); document.body.classList.add('modal-open');
  modalOverlay.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal);
  modalOverlay.onclick=e=>{ if(e.target===modalOverlay) closeModal(); };
}
function closeModal(){ modalOverlay.classList.remove('show'); modalOverlay.innerHTML=''; document.body.classList.remove('modal-open'); }
function setErr(field,msg){ const e=document.querySelector(`[data-err="${field}"]`); if(e) e.textContent=msg; }
function setupAutocomplete(input){
  const box = input.closest('.auto-wrap').querySelector('.autocomplete');
  input.addEventListener('input',()=>{
    const q=input.value.trim().toLowerCase(); if(q.length<2){ box.style.display='none'; return; }
    const opts=[...new Set(data.transactions.map(x=>x.description).filter(Boolean))].filter(d=>d.toLowerCase().includes(q) && d.toLowerCase()!==q).slice(0,5);
    box.innerHTML=opts.map(o=>`<button type="button">${escapeHtml(o)}</button>`).join(''); box.style.display=opts.length?'block':'none';
    box.querySelectorAll('button').forEach(b=>b.onclick=()=>{ input.value=b.textContent; box.style.display='none'; input.dispatchEvent(new Event('input')); });
  });
}
function toast(msg,type='success'){
  const div=document.createElement('div'); div.className=`toast ${type}`; div.textContent=(type==='success'?'✅ ':'❌ ')+msg; toastWrap.appendChild(div); setTimeout(()=>div.remove(),3100);
}

function drawDonutData(canvasId,items,tipId){
  const canvas=document.getElementById(canvasId); if(!canvas) return; const ctx=canvas.getContext('2d'); const rect=canvas.parentElement.getBoundingClientRect(); const dpr=window.devicePixelRatio||1; canvas.width=rect.width*dpr; canvas.height=rect.height*dpr; ctx.scale(dpr,dpr); const w=rect.width,h=rect.height; ctx.clearRect(0,0,w,h);

  items.forEach((it,idx)=>{ const ang=it.value/total*Math.PI*2, gap=.018; const end=start+ang; const mid=(start+end)/2; const scale=idx===selectedDonutIndex?1.05:1; const ox=Math.cos(mid)*(scale-1)*8, oy=Math.sin(mid)*(scale-1)*8; ctx.beginPath(); ctx.arc(cx+ox,cy+oy,r*scale,start+gap,end-gap); ctx.arc(cx+ox,cy+oy,inner*scale,end-gap,start+gap,true); ctx.closePath(); ctx.fillStyle=it.color; ctx.fill(); seg.push({...it,start,end,pct:it.value/total*100}); start=end; });

function drawLine(canvasId,points,tipId){
  const canvas=document.getElementById(canvasId); if(!canvas) return; const ctx=canvas.getContext('2d'); const rect=canvas.parentElement.getBoundingClientRect(); const dpr=window.devicePixelRatio||1; canvas.width=rect.width*dpr; canvas.height=rect.height*dpr; ctx.scale(dpr,dpr); const w=rect.width,h=rect.height; ctx.clearRect(0,0,w,h);
  points=(points||[]).filter(p=>isFinite(p.value)); if(!points.length){ ctx.fillStyle=getCSS('--texto-secundario'); ctx.font='bold 13px Inter'; ctx.textAlign='center'; ctx.fillText('Sem dados',w/2,h/2); return; }
  const pad=34, top=20, bottom=34; const max=Math.max(...points.map(p=>p.value),1), min=Math.min(...points.map(p=>p.value),0); const span=max-min||1;
  const pts=points.map((p,i)=>({x:pad+(w-pad*2)*(points.length===1?0.5:i/(points.length-1)),y:top+(h-top-bottom)*(1-(p.value-min)/span),...p}));
  ctx.strokeStyle=getCSS('--borda'); ctx.lineWidth=1; for(let i=0;i<4;i++){ const y=top+i*(h-top-bottom)/3; ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(w-pad,y); ctx.stroke(); }
  const grad=ctx.createLinearGradient(0,top,0,h-bottom); grad.addColorStop(0,'rgba(30,123,75,.20)'); grad.addColorStop(1,'rgba(30,123,75,0)'); ctx.beginPath(); ctx.moveTo(pts[0].x,h-bottom); pts.forEach((p,i)=>{ if(i===0) ctx.lineTo(p.x,p.y); else { const prev=pts[i-1]; const mx=(prev.x+p.x)/2; ctx.bezierCurveTo(mx,prev.y,mx,p.y,p.x,p.y); } }); ctx.lineTo(pts[pts.length-1].x,h-bottom); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); pts.forEach((p,i)=>{ if(i===0) ctx.moveTo(p.x,p.y); else { const prev=pts[i-1]; const mx=(prev.x+p.x)/2; ctx.bezierCurveTo(mx,prev.y,mx,p.y,p.x,p.y); } }); ctx.strokeStyle='#1E7B4B'; ctx.lineWidth=3; ctx.stroke();
  ctx.fillStyle='#1E7B4B'; pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle=getCSS('--texto-secundario'); ctx.font='10px Inter'; ctx.textAlign='center'; pts.forEach(p=>ctx.fillText(p.label,p.x,h-16)); ctx.textAlign='right'; ctx.fillText(shortMoney(max),pad-6,top+4); ctx.fillText(shortMoney(min),pad-6,h-bottom);
  canvas.onmousemove=canvas.ontouchstart=e=>{ const pos=getCanvasPos(canvas,e.touches?e.touches[0]:e); const near=pts.reduce((best,p)=>Math.abs(p.x-pos.x)<Math.abs(best.x-pos.x)?p:best,pts[0]); ctx.clearRect(0,0,w,h); drawLine(canvasId,points,tipId); showCanvasTip(tipId,near.x,near.y,`${near.label}: ${fmt.format(near.value)}`); };

function roundedRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h); ctx.lineTo(x,y+h); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }
function getCSS(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function shortMoney(v){ if(hideValues) return '••••'; const n=Number(v)||0; if(Math.abs(n)>=1000000) return 'R$ '+(n/1000000).toLocaleString('pt-BR',{maximumFractionDigits:1})+' mi'; if(Math.abs(n)>=1000) return 'R$ '+(n/1000).toLocaleString('pt-BR',{maximumFractionDigits:1})+' mil'; return 'R$ '+Math.round(n); }

async function checkForAppUpdate(manual=false){
  if(location.protocol === 'file:'){
    if(manual) toast('Atualização automática só funciona hospedado em HTTPS','error');
    return;
  }
  try{
    const url = './version.json?ts=' + Date.now();
    const res = await fetch(url,{cache:'no-store'});
    if(!res.ok) throw new Error('version.json indisponível');
    const remote = await res.json();
    const remoteVersion = String(remote.version || '').trim();
    if(!remoteVersion) throw new Error('versão inválida');
    storage.rawSet(VERSION_KEY, APP_VERSION);
    if(remoteVersion !== APP_VERSION){
      if(manual) toast('Nova versão encontrada. Atualizando...');
      await applyAppUpdate(remoteVersion);
    } else if(manual){
      toast('Você já está na versão mais recente');
    }
  }catch(err){
    if(manual) toast('Não consegui verificar atualização agora','error');
  }
}
async function applyAppUpdate(remoteVersion){
  try{
    const msg = `Nova versão v${remoteVersion} disponível. O app será atualizado agora.`;
    toast('Atualizando Upcash...');
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister().catch(()=>{})));
    }
    if('caches' in window){
      const keys = await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k).catch(()=>{})));
    }
    storage.rawSet(VERSION_KEY, remoteVersion);
    setTimeout(()=>{
      const base = location.pathname.replace(/index\.html$/,'');
      location.replace(base + '?v=' + encodeURIComponent(remoteVersion));
    },900);
  }catch(e){
    toast('Erro ao atualizar. Tente recarregar manualmente.','error');
  }
}
async function forceAppReload(){
  if(!confirm('Limpar cache do app e recarregar agora? Seus dados financeiros serão mantidos.')) return;
  try{
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister().catch(()=>{})));
    }
    if('caches' in window){
      const keys = await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k).catch(()=>{})));
    }
  }catch(e){}
  location.replace(location.pathname.replace(/index\.html$/,'') + '?refresh=' + Date.now());
}

function checkGoalNotifications(category){
  const goal=Number(data.budgetGoals[category]||0); if(!goal) return; const spent=sum(variableExpenses(monthTx()).filter(x=>x.category===category)); const pct=spent/goal*100;
  const key80=category+'80'+data.currentMonth, key100=category+'100'+data.currentMonth;
  if(pct>=100 && !notifiedGoals.has(key100)){ notify(`🚨 ${category}: meta ultrapassada!`); notifiedGoals.add(key100); }
  else if(pct>=80 && !notifiedGoals.has(key80)){ notify(`⚠️ ${category}: ${Math.round(pct)}% da meta atingida`); notifiedGoals.add(key80); }

function biggestCategory(month=data.currentMonth){
  const grouped = groupByCategory(expenses(monthTx(month)));
  let best=['—',0];
  Object.entries(grouped).forEach(([k,v])=>{ if(v>best[1]) best=[k,v]; });

}
function suggestCategory(desc=''){

  const map = [
    [['ifood','hamburg','pizza','lanche','delivery','burger','sushi'], 'Delivery'],
    [['uber','99','gasolina','onibus','ônibus','combust','estacionamento','pedagio'], 'Transporte'],

function buildAlerts(){
  const res=[]; const t=totals(); const prev=totals(addMonths(data.currentMonth,-1));
  if(t.saldo < 0) res.push({icon:'🚨', title:'Saldo negativo', text:'Suas despesas do mês ultrapassaram a receita. Vale segurar gastos até fechar o mês.'});
  if(t.receita===0) res.push({icon:'💡', title:'Receitas ainda zeradas', text:'Você ainda não lançou entradas neste mês. Adicione salário, renda extra ou freelas.'});
  if(prev.despesa>0 && t.despesa > prev.despesa) res.push({icon:'📈', title:'Gastos acima do mês passado', text:`Você gastou ${money(t.despesa-prev.despesa)} a mais do que em ${monthHuman(addMonths(data.currentMonth,-1))}.`});
  Object.entries(data.budgetGoals||{}).forEach(([cat,goal])=>{ const spent=sum(variableExpenses(monthTx()).filter(x=>x.category===cat)); const pct=goal?spent/goal*100:0; if(pct>=100) res.push({icon:'⚠️', title:`Meta estourada em ${cat}`, text:`Você já usou ${Math.round(pct)}% da meta de ${cat}.`}); else if(pct>=80) res.push({icon:'🟠', title:`Meta quase no limite`, text:`${cat} já consumiu ${Math.round(pct)}% do teto mensal.`}); });
  const overdue = data.subscriptions.filter(s=>subscriptionStatus(s)==='late').length;
  if(overdue) res.push({icon:'⏰', title:'Contas em atraso', text:`Você tem ${overdue} conta${overdue>1?'s':''} recorrente${overdue>1?'s':''} marcada${overdue>1?'s':''} como atrasada${overdue>1?'s':''}.`});
  if(!res.length) res.push({icon:'✅', title:'Tudo sob controle', text:'Seu painel está limpo. Continue adicionando gastos para receber alertas inteligentes.'});
  return res.slice(0,5);
}
function financeScore(){
  const t = totals(); let score = 55;
  if(t.saldo >= 0) score += 15; else score -= 18;
  if(t.receita>0 && t.despesa <= t.receita*0.7) score += 10; else if(t.receita>0 && t.despesa > t.receita) score -= 12;
  if(t.investir > 0) score += 10;
  const debtRatio = patrimonioTotal() > 0 ? (data.patrimonio.dividas.total || 0) / patrimonioTotal() : 0.5;
  if(debtRatio < 0.2) score += 10; else if(debtRatio > 0.4) score -= 10;
  const goals = data.vaultGoals || [];
  if(goals.length){ const avg = goals.reduce((a,g)=>a+((Number(g.current||0)/Math.max(Number(g.target||1),1))*100),0)/goals.length; if(avg>=50) score += 6; }
  score = Math.max(0, Math.min(100, Math.round(score)));
  const label = score>=85 ? 'Excelente' : score>=70 ? 'Bom controle' : score>=55 ? 'Atenção moderada' : 'Zona de alerta';
  const tip = score>=85 ? 'Seu caixa está saudável e seus hábitos estão consistentes.' : score>=70 ? 'Você está bem, mas ainda dá para otimizar metas e aportes.' : score>=55 ? 'Seu mês pede mais disciplina em categorias variáveis.' : 'É hora de reduzir gastos e reorganizar prioridades.';
  return {score,label,tip};
}
function monthlyInsight(){
  const t=totals(); const prev=totals(addMonths(data.currentMonth,-1)); const [bigCat,bigVal]=biggestCategory();
  const delta = t.saldo - prev.saldo;
  const best = t.investir>0 ? 'Você conseguiu manter aportes neste mês.' : t.saldo>=0 ? 'Seu saldo está positivo até aqui.' : 'Vale priorizar despesas essenciais primeiro.';
  return {
    topExpense: bigVal ? `${bigCat} (${money(bigVal,{sign:'neg'})})` : 'Sem gastos relevantes',
    deltaText: prev.receita || prev.despesa ? `${delta>=0?'Melhora':'Piora'} de ${money(Math.abs(delta))} no saldo em relação ao mês passado.` : 'Sem comparação suficiente com o mês anterior.',
    best,
    attention: t.saldo<0 ? 'Seu saldo atual está negativo.' : bigCat==='Delivery' ? 'Delivery está puxando seus gastos.' : 'Continue acompanhando metas e assinaturas.'
  };
}

function renderMiniCalendar(month=data.currentMonth){

function markSubscriptionPaid(id){
  const sub=data.subscriptions.find(s=>s.id===id); if(!sub) return;
  if(data.transactions.some(x=>x.subscriptionId===id && x.month===data.currentMonth)) return toast('Essa conta já foi marcada como paga neste mês');
  const day = Math.min(Number(sub.dueDay||1), monthSpan(data.currentMonth));
  const date = monthDate(data.currentMonth, day);
  data.transactions.push({ id:uuid(), type:'despesa', subtype:'fixa', date, description:sub.name, category:sub.category||'Fixa', value:Number(sub.amount||0), month:data.currentMonth, responsible:data.coupleMode.name1||'Você', recurring:false, recurringMonths:0, dueDay:sub.dueDay, subscriptionId:id });
  save(); render(); toast('Conta marcada como paga');
}

  ['ccName','ccLimit','ccClosing','ccDue'].forEach(id=>document.getElementById(id).addEventListener('input',e=>{ if(id==='ccLimit') maskMoneyInput(e.target); validateCard(); }));
  function validateCard(){ const okName=document.getElementById('ccName').value.trim().length>=2; const okLimit=parseMoney(document.getElementById('ccLimit').value)>0; document.getElementById('ccSave').disabled=!(okName&&okLimit); setErr('ccName',okName?'':'Mínimo 2 caracteres'); setErr('ccLimit',okLimit?'':'Defina um limite válido'); }
  validateCard(); document.getElementById('ccForm').onsubmit=(e)=>{ e.preventDefault(); if(document.getElementById('ccSave').disabled) return; const item={id:card?.id||uuid(),name:document.getElementById('ccName').value.trim(),limit:parseMoney(document.getElementById('ccLimit').value),closingDay:Number(document.getElementById('ccClosing').value)||10,dueDay:Number(document.getElementById('ccDue').value)||17}; const idx=data.creditCards.findIndex(c=>c.id===item.id); if(idx>=0) data.creditCards[idx]=item; else data.creditCards.push(item); save(); closeModal(); render(); toast('Cartão salvo'); };

function cardOutstanding(card){ return sum(data.transactions.filter(x=>x.cardId===card.id && x.month>=data.currentMonth)); }
function cardInvoice(card, month=data.currentMonth){ return sum(data.transactions.filter(x=>x.cardId===card.id && x.month===month)); }
function renderCreditCards(){
  if(!data.creditCards.length) return `<div class="empty">Nenhum cartão cadastrado. Adicione cartões para acompanhar limite, fatura e compras parceladas.</div>`;
  return `<div class="soft-list">${data.creditCards.map(card=>{ const invoice = cardInvoice(card), outstanding=cardOutstanding(card), available=Math.max(0, Number(card.limit||0)-outstanding); return `<div class="soft-row"><div class="top"><div><div class="name">${escapeHtml(card.name)}</div><div class="muted" style="font-size:12px">Fecha dia ${card.closingDay} · vence dia ${card.dueDay}</div></div><div><button class="edit-btn" data-card-edit="${card.id}">✏</button></div></div><div class="credit-metrics"><div class="metric"><span>Fatura</span><strong>${money(invoice,{sign:'neg'})}</strong></div><div class="metric"><span>Disponível</span><strong>${money(available)}</strong></div><div class="metric"><span>Em aberto</span><strong>${money(outstanding,{sign:'neg'})}</strong></div></div><div class="small-actions"><button class="btn primary small" data-card-buy="${card.id}">+ Compra</button></div></div>`; }).join('')}</div>`;
}
function splitInstallments(total, count){ const cents=Math.round(total*100); const base=Math.floor(cents/count); let rem=cents-base*count; const arr=[]; for(let i=0;i<count;i++){ let c=base; if(rem>0){ c++; rem--; } arr.push(c/100); } return arr; }

  function validateInst(){ const okDate=!!document.getElementById('instDate').value; const okDesc=document.getElementById('instDesc').value.trim().length>=2; const okTotal=parseMoney(document.getElementById('instTotal').value)>0; const count=Number(document.getElementById('instCount').value); const okCount=count>=2 && count<=48; setErr('instDate',okDate?'':'Informe a data'); setErr('instDesc',okDesc?'':'Mínimo 2 caracteres'); setErr('instTotal',okTotal?'':'Informe o valor'); setErr('instCount',okCount?'':'Entre 2 e 48 parcelas'); document.getElementById('instSave').disabled=!(okDate&&okDesc&&okTotal&&okCount); }

function antiSpendAdvice(value){
  const t=totals(); const free=Math.max(0, t.saldo - t.investir); const pct = free ? (value/free*100) : 999;
  if(value<=free*0.2) return {title:'Pode comprar com tranquilidade', text:`Esse gasto consome cerca de ${Math.round(pct)}% do seu saldo livre atual.`, tone:'success'};
  if(value<=free) return {title:'Pode comprar, mas com atenção', text:`O valor usa ${Math.round(pct)}% do saldo livre do mês. Veja se não atrapalha metas e aportes.`, tone:'warn'};
  return {title:'Melhor evitar agora', text:'Essa compra ultrapassa o saldo livre disponível neste mês e pode comprometer seu orçamento.', tone:'error'};
}

let __lastCalendarOpen = { date:null, at:0 };
function handleCalendarDelegatedTap(event){
  const btn = event.target.closest && event.target.closest('[data-calendar-date]');
  if(!btn) return;
  event.preventDefault();
  event.stopPropagation();
  const now = Date.now();
  const date = btn.dataset.calendarDate;
  if(__lastCalendarOpen.date === date && now - __lastCalendarOpen.at < 650) return;
  __lastCalendarOpen = { date, at: now };
  showCalendarDay(date);
}
document.addEventListener('click', handleCalendarDelegatedTap, true);
document.addEventListener('touchend', handleCalendarDelegatedTap, {capture:true, passive:false});

  const users=upcashUsers();
  if(!users[id]) return false;
  let d = storage.get(upcashUserDataKey(id));
  if(!d || !d.version) d = demoData();
  migrate(d);
  d.appVersion = APP_VERSION;
  data = d;
  storage.set(KEY, data);
  storage.rawSet(Upcash_ACTIVE_USER_KEY, id);
  storage.rawSet(Upcash_SESSION_KEY, 'true');
  upcashDisableCloud();
  view='overview'; previousView='overview';
  return true;
}
function upcashReadableDate(iso){
  if(!iso) return '—';
  try{return new Date(iso).toLocaleString('pt-BR');}catch(e){return iso;}
}
function upcashExistingDataForImport(){
  const d = storage.get(KEY);
  if(d && d.version){ migrate(d); return d; }
  return demoData();
}
function upcashCreateUser(){
  const nameEl=document.getElementById('upcashNewName');
  const pinEl=document.getElementById('upcashNewPin');
  const err=document.getElementById('upcashCreateErr');
  const importEl=document.getElementById('upcashImportCurrent');
  if(err) err.textContent='';
  const name=(nameEl?.value || '').trim();
  const pin=(pinEl?.value || '').trim();
  const id=upcashNormalizeName(name);
  if(!name || id.length<2){ if(err) err.textContent='Digite um nome de usuário válido.'; return; }
  if(!/^\d{4}$/.test(pin)){ if(err) err.textContent='Use um PIN de 4 números.'; return; }
  const users=upcashUsers();
  if(users[id]){ if(err) err.textContent='Esse usuário já existe.'; return; }
  const d = importEl?.checked ? upcashExistingDataForImport() : demoData();
  migrate(d); d.appVersion=APP_VERSION; d.visualTheme = (typeof normalizeVisualTheme === 'function') ? normalizeVisualTheme(d.visualTheme || 'dark-pro') : (d.visualTheme || 'dark-pro');
  users[id] = {id, name, pin, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(), theme:d.visualTheme || 'dark-pro'};
  upcashSaveUsers(users);
  storage.set(upcashUserDataKey(id), d);
  storage.rawSet(Upcash_LEGACY_IMPORTED_KEY, 'true');
  upcashLoadProfile(id);
  toast('Usuário criado: '+name);
  render();
}
function upcashLoginUser(){
  const users=upcashUsers();
  const id=document.getElementById('upcashLoginUser')?.value || upcashNormalizeName(document.getElementById('upcashLoginName')?.value);
  const pin=(document.getElementById('upcashLoginPin')?.value || '').trim();
  const err=document.getElementById('upcashLoginErr'); if(err) err.textContent='';
  if(!users[id]){ if(err) err.textContent='Usuário não encontrado.'; return; }
  if(users[id].pin !== pin){ if(err) err.textContent='PIN incorreto.'; return; }
  upcashLoadProfile(id);
  toast('Bem-vindo, '+users[id].name);
  render();
}
function upcashDeleteUserFromLogin(id){
  const users=upcashUsers();
  const u=users[id];
  if(!u) return;
  if(!confirm(`Excluir o usuário "${u.name}" e todos os dados dele neste aparelho?`)) return;
  delete users[id]; upcashSaveUsers(users);
  try{ localStorage.removeItem(upcashUserDataKey(id)); }catch(e){}
  if(upcashActiveId()===id){ storage.rawSet(Upcash_ACTIVE_USER_KEY,''); storage.rawSet(Upcash_SESSION_KEY,'false'); }
  toast('Usuário excluído'); render();
}
function renderUpcashLoginScreen(){
  upcashDisableCloud();
  applyDark(); closeSpeed(false);
  if(fab) fab.style.display='none';
  nav.innerHTML='';
  const users=upcashUsers();
  const list=Object.values(users).sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  header.innerHTML=`<div class="logo">${upcashLogoHtml()}<span class="brand-name upcash-word">Up<span>cash</span></span></div>`;
  const hasUsers=list.length>0;
  const loginBlock = hasUsers ? `<div class="upcash-auth-section"><h2>Entrar</h2><div class="field"><label>Usuário</label><select id="upcashLoginUser">${list.map(u=>`<option value="${upEsc(u.id)}">${upEsc(u.name)}</option>`).join('')}</select></div><div class="field"><label>PIN</label><input id="upcashLoginPin" type="password" inputmode="numeric" maxlength="4" placeholder="••••"><div class="error" id="upcashLoginErr"></div></div><button class="btn primary full" id="upcashLoginBtn">Entrar</button><div class="upcash-users-mini">${list.map(u=>`<button type="button" data-del-user="${upEsc(u.id)}">Excluir ${upEsc(u.name)}</button>`).join('')}</div></div>` : `<div class="upcash-empty-user"><strong>Nenhum usuário local criado ainda.</strong><span>Crie seu primeiro perfil para guardar seus dados separados neste aparelho.</span></div>`;
  const importChecked = !storage.rawGet(Upcash_LEGACY_IMPORTED_KEY) ? 'checked' : '';
  app.innerHTML=`<div class="upcash-login-wrap"><div class="upcash-login-card"><div class="upcash-hero-brand">${upcashLogoHtml('big')}<div><h1>Up<span>cash</span></h1><p>controle financeiro inteligente</p></div></div>${loginBlock}<div class="upcash-auth-section create"><h2>Criar usuário local</h2><div class="field"><label>Nome do usuário</label><input id="upcashNewName" autocomplete="username" placeholder="Ex: Kainã"></div><div class="field"><label>PIN de 4 números</label><input id="upcashNewPin" type="password" inputmode="numeric" maxlength="4" placeholder="1234"><div class="error" id="upcashCreateErr"></div></div><label class="upcash-check"><input id="upcashImportCurrent" type="checkbox" ${importChecked}> <span>Importar os dados atuais para este usuário</span></label><button class="btn ghost full" id="upcashCreateBtn">Criar e entrar</button><p class="small-note">Login local: os dados ficam salvos somente neste celular/navegador. Não usa nuvem e não envia informações para fora.</p></div></div></div>`;
  const login=document.getElementById('upcashLoginBtn'); if(login) login.onclick=upcashLoginUser;
  const create=document.getElementById('upcashCreateBtn'); if(create) create.onclick=upcashCreateUser;
  const pin=document.getElementById('upcashLoginPin'); if(pin) pin.addEventListener('keydown',e=>{if(e.key==='Enter') upcashLoginUser();});
  const newPin=document.getElementById('upcashNewPin'); if(newPin) newPin.addEventListener('keydown',e=>{if(e.key==='Enter') upcashCreateUser();});
  document.querySelectorAll('[data-del-user]').forEach(b=>b.onclick=()=>upcashDeleteUserFromLogin(b.dataset.delUser));
}
function upcashLocalSettingsCard(){
  const user=upcashCurrentUser();
  const users=Object.values(upcashUsers());
  return `<div class="card settings-section" id="upcashLocalLoginCard"><h2>Login local</h2><div class="upcash-local-status"><div>${upcashLogoHtml()}<div><strong>${user?upEsc(user.name):'Sem usuário ativo'}</strong><span>${user?'Dados separados neste aparelho':'Entre ou crie um usuário local'}</span></div></div><b>${users.length} perfil${users.length===1?'':'is'}</b></div><div class="small-note">Sem nuvem: cada usuário salva seus próprios gastos, receitas, dívidas, metas, temas e configurações no armazenamento local deste celular/navegador.</div><div class="cloud-actions" style="margin-top:12px"><button class="btn primary" id="upcashSwitchUserBtn">Trocar usuário</button><button class="btn ghost" id="upcashLogoutBtn">Sair</button></div></div>`;
}
function bindUpcashLocalSettings(){
  const out=document.getElementById('upcashLogoutBtn'); if(out) out.onclick=logout;
  const sw=document.getElementById('upcashSwitchUserBtn'); if(sw) sw.onclick=()=>{ upcashPersistCurrentProfile(); storage.rawSet(Upcash_SESSION_KEY,'false'); toast('Escolha outro usuário'); render(); };
}
function upcashEnhanceSettings(){
  const cloudCard=document.getElementById('cloudSettingsCard'); if(cloudCard) cloudCard.remove();
  if(!document.getElementById('upcashLocalLoginCard')){
    const first=document.querySelector('.settings-section');
    if(first) first.insertAdjacentHTML('beforebegin', upcashLocalSettingsCard());
  }
  bindUpcashLocalSettings();
}
const __upcashRenderHeaderCore = renderHeader;
renderHeader = function(){
  header.innerHTML = `<div class="logo">${upcashLogoHtml()}<span class="brand-name upcash-word">Up<span>cash</span></span></div>
    <div class="month-pill"><button id="prevMonth" aria-label="Mês anterior">‹</button><span class="month-label">${monthHuman(data.currentMonth)}</span><button id="nextMonth" aria-label="Próximo mês">›</button></div>
    <div class="top-actions"><button class="header-icon" id="globalSearchBtn" title="Busca global">⌕</button><button class="settings-btn" id="settingsBtn" title="Configurações">⚙</button></div>`;
  document.getElementById('prevMonth').onclick=()=>{ data.currentMonth=addMonths(data.currentMonth,-1); savePatrimonioSnapshot(data.currentMonth); save(); render(); };
  document.getElementById('nextMonth').onclick=()=>{ data.currentMonth=addMonths(data.currentMonth,1); savePatrimonioSnapshot(data.currentMonth); save(); render(); };
  document.getElementById('settingsBtn').onclick=()=>{ if(view!=='settings') previousView=view; view='settings'; render(); };
  const gs=document.getElementById('globalSearchBtn'); if(gs) gs.onclick=showGlobalSearchModal;
};
const __upcashRenderNavCore = renderNav;
renderNav = function(){
  const items = [
    ['overview','□','Visão geral'],['budget','⇄','Orçamento'],['investments','↗','Investimentos'],['patrimonio','◇','Patrimônio'],['logout','→','Sair']
  ];
  nav.innerHTML = items.map(([id,ic,lab])=>`<button class="nav-item ${view===id?'active':''}" data-nav="${id}"><span>${ic}</span>${lab}</button>`).join('');
  nav.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{
    const id = btn.dataset.nav;
    if(id==='logout') return logout();
    if(view!=='settings') previousView=id;
    view=id; render();
  });
};
const __upcashSaveCore = save;
save = function(){
  __upcashSaveCore();
  if(upcashIsLogged()) upcashPersistCurrentProfile();
  if(saveIndicator) saveIndicator.textContent = upcashIsLogged() ? `✓ Salvo em ${upcashCurrentUser()?.name || 'usuário'}` : '✓ Salvo localmente';
};
const __upcashSettingsCore = renderSettings;
renderSettings = function(){
  __upcashSettingsCore();
  upcashEnhanceSettings();
};
const __upcashRenderCore = render;
render = function(){
  upcashDisableCloud();
  if(!upcashIsLogged()){
    renderUpcashLoginScreen();
    return;
  }
  if(fab) fab.style.display='';
  __upcashRenderCore();
};
logout = function(){
  const u=upcashCurrentUser();
  if(!u){ storage.rawSet(Upcash_SESSION_KEY,'false'); render(); return; }
  if(confirm(`Sair do usuário "${u.name}"? Seus dados continuarão salvos neste aparelho.`)){
    upcashPersistCurrentProfile();
    storage.rawSet(Upcash_SESSION_KEY,'false');
    toast('Sessão encerrada');
    render();
  }
};
function initUpcashLocalAuth(){
  upcashDisableCloud();
  document.body.classList.add('upcash-app');
  const id=upcashActiveId();
  if(upcashSessionActive() && id && upcashUsers()[id]) upcashLoadProfile(id);
  render();
}

initUpcashLocalAuth();

</script>
</body>
</html>
