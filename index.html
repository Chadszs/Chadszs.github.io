  <style>
    :root{

    body.dark{
      --cinza-fundo:#060913;
      --branco:#0F1726;
      --texto-principal:#F8FAFF;
      --texto-secundario:#98A8C6;

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:radial-gradient(circle at top, #121c38 0%, #070B14 58%, #04070E 100%);

      -webkit-tap-highlight-color:transparent;

    body.modal-open{overflow:hidden}
    .app-shell{

      background:linear-gradient(180deg,#0A1020 0%, #070B14 100%); position:relative; overflow-x:hidden; border-left:1px solid rgba(108,242,255,.08); border-right:1px solid rgba(108,242,255,.08);

    .app-header{

      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--borda); z-index:50;
      display:grid; grid-template-columns:112px 1fr 42px; align-items:center; padding:0 12px;
    }
    body.dark .app-header{background:rgba(4,7,14,.86)}
    .logo{display:flex; align-items:center; gap:8px; font-weight:800; letter-spacing:.5px; color:var(--texto-principal); font-size:18px; white-space:nowrap}

    .theme-option{border:1px solid var(--borda);background:var(--branco);color:var(--texto-principal);border-radius:18px;padding:12px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;font:inherit;text-align:left;box-shadow:var(--soft-shadow);cursor:pointer}

    body.theme-black{--verde-principal:#E5E7EB;--verde-claro:#4ADE80;--azul:#60A5FA;--vermelho:#FB7185;--laranja:#F59E0B;--roxo:#A78BFA;--cinza-fundo:#050505;--branco:#101010;--texto-principal:#F5F5F5;--texto-secundario:#A1A1AA;--borda:#232323;--shadow:0 14px 36px rgba(0,0,0,.45);--soft-shadow:0 8px 22px rgba(0,0,0,.35)}
    body.theme-black{background:#0a0a0a}

    body.theme-black .fab{background:linear-gradient(135deg,#FFFFFF,#D4D4D8);color:#111827;box-shadow:0 12px 24px rgba(0,0,0,.25)}

    body.theme-neon .app-shell{background:linear-gradient(180deg,#0A1020 0%, #070B14 100%);border-left:1px solid rgba(108,242,255,.08); border-right:1px solid rgba(108,242,255,.08)}

    .badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900;white-space:nowrap}.person-badge{font-size:10px;border-radius:999px;padding:4px 7px;font-weight:900;background:rgba(46,109,164,.12);color:var(--azul)}.person-badge.p2{background:rgba(155,89,182,.13);color:var(--roxo)}

    .tabs,.subtabs,.segment{display:flex;gap:6px;background:rgba(107,114,128,.10);padding:4px;border-radius:14px;margin-bottom:12px}.tabs button,.subtabs button,.segment button{border:0;background:transparent;color:var(--texto-secundario);border-radius:11px;padding:9px 10px;font-weight:900;font-size:12px;flex:1;cursor:pointer}.tabs button.active,.subtabs button.active,.segment button.active{background:var(--branco);color:var(--verde-principal);box-shadow:0 1px 8px rgba(0,0,0,.08)}

    .filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.chip{border:1px solid var(--borda);background:var(--branco);color:var(--texto-secundario);border-radius:999px;padding:8px 10px;font-size:12px;font-weight:800;cursor:pointer}.chip.active{background:rgba(30,123,75,.12);border-color:rgba(30,123,75,.35);color:var(--verde-principal)}

    .chart-wrap{position:relative;width:100%;height:220px}.chart-wrap.small{height:185px}.chart-wrap canvas{width:100%;height:100%;display:block}.chart-tooltip{position:absolute;z-index:5;background:rgba(15,23,42,.94);color:white;border-radius:10px;padding:7px 9px;font-size:11px;font-weight:800;pointer-events:none;transform:translate(-50%,-115%);white-space:nowrap;display:none}.legend{display:flex;flex-direction:column;gap:7px;margin-top:10px}.legend-item{display:flex;justify-content:space-between;gap:10px;font-size:12px;font-weight:800;color:var(--texto-secundario)}.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px}

    .pat-card{margin-bottom:12px;padding:18px;border-radius:18px;background:var(--branco);border:1px solid var(--borda);box-shadow:var(--soft-shadow);cursor:pointer}.pat-row{display:flex;align-items:center;gap:14px}.pat-ico{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}.pat-info{flex:1}.pat-info .label{font-size:12px;letter-spacing:2px;color:var(--texto-secundario);font-weight:900}.pat-info .value{font-size:24px;font-weight:900;margin-top:8px}.pat-items{display:none;margin-top:14px;border-top:1px solid var(--borda);padding-top:12px;cursor:default}.pat-card.open .pat-items{display:block}.item-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 0;border-bottom:1px solid var(--borda);font-size:13px;font-weight:800}.item-row:last-child{border-bottom:0}

  <div class="app-shell" id="appShell">

<script>
'use strict';

const KEY = 'neonvault_data_mobile';
const DARK_KEY = 'neonvault_darkMode';
const app = document.getElementById('screen');
const header = document.getElementById('appHeader');
const nav = document.getElementById('bottomNav');
const modalOverlay = document.getElementById('modalOverlay');
const sheetOverlay = document.getElementById('sheetOverlay');
const filterSheet = document.getElementById('filterSheet');
const fab = document.getElementById('fab');
const speedOverlay = document.getElementById('speedOverlay');
const speedMenu = document.getElementById('speedMenu');
const toastWrap = document.getElementById('toastWrap');
const saveIndicator = document.getElementById('saveIndicator');
let deferredInstallPrompt = null;
let saveIndicatorTimer = null;

const storage = {
  get(key){
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e){ return window.__appData?.[key] ?? null; }
  },
  set(key,val){
    try { localStorage.setItem(key, JSON.stringify(val)); }
    catch(e){ window.__appData = window.__appData || {}; window.__appData[key] = val; }
  },
  rawGet(key){
    try { return localStorage.getItem(key); }
    catch(e){ return window.__appData?.[key] ?? null; }
  },
  rawSet(key,val){
    try { localStorage.setItem(key, val); }
    catch(e){ window.__appData = window.__appData || {}; window.__appData[key] = val; }
  },
  clear(){
    try { localStorage.removeItem(KEY); localStorage.removeItem(DARK_KEY); }
    catch(e){ if(window.__appData){ delete window.__appData[KEY]; delete window.__appData[DARK_KEY]; } }
  }
};

const fmt = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const monthFmt = new Intl.DateTimeFormat('pt-BR',{month:'long',year:'numeric'});
const dateLongFmt = new Intl.DateTimeFormat('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
const monthShortFmt = new Intl.DateTimeFormat('pt-BR',{month:'short'});
const uuid = () => (crypto?.randomUUID ? crypto.randomUUID() : 'id-' + Date.now().toString(36) + Math.random().toString(36).slice(2));

const categoryEmoji = {
  Mercado:'🛒', Transporte:'🚗', Farmácia:'💊', Lazer:'🎮', Delivery:'🍕', Vestuário:'👕', Exercício:'🏋️', Estudos:'📚', Investimento:'📈', Outros:'📦', Fixa:'📌'
};
const investTypes = ['Renda Fixa','Ações','FIIs','Tesouro Direto','Cripto','Outros'];
const investColors = {'Renda Fixa':'#27AE60','Ações':'#2E6DA4','FIIs':'#E67E22','Tesouro Direto':'#1ABC9C','Cripto':'#9B59B6','Outros':'#95A5A6'};

let data = loadData();
let view = 'overview';
let previousView = 'overview';
let budgetSub = 'receita';
let budgetMode = 'table';
let investSub = 'aportes';
let hideValues = false;
let currency = 'BRL';
let expandedRule = true;
let expandedPat = {};
let responsibleFilter = 'Todos';
let filter = { search:'', categories:[], period:'Mês atual' };
let activeDonutSegments = [];
let selectedDonutIndex = -1;
let notifiedGoals = new Set();

function demoData(){
  const currentMonth = new Date().toISOString().slice(0,7);
  const cats = [
    {name:'Mercado',color:'#27AE60',rule:'necessidade'},
    {name:'Transporte',color:'#3498DB',rule:'necessidade'},
    {name:'Farmácia',color:'#E74C3C',rule:'necessidade'},
    {name:'Lazer',color:'#9B59B6',rule:'desejo'},
    {name:'Estudos',color:'#1ABC9C',rule:'desejo'},
    {name:'Delivery',color:'#E67E22',rule:'desejo'},
    {name:'Vestuário',color:'#F39C12',rule:'desejo'},
    {name:'Exercício',color:'#2ECC71',rule:'desejo'},
    {name:'Investimento',color:'#2E6DA4',rule:'investimento'},
    {name:'Outros',color:'#95A5A6',rule:'ignorar'}
  ];
  return {
    version:3,
    currentMonth,
    darkMode:true,
    visualTheme:'black',
    coupleMode:{enabled:false,name1:'Você',name2:'Parceiro(a)'},
    usdRate:5.85,
    transactions:[],
    patrimonio:{
      liquidez:{total:0,items:[]},
      bens:{total:0,items:[]},
      investimentos:{total:0,items:[]},
      dividas:{total:0,items:[]}
    },
    patrimonioHistory:[],
    categories:cats,
    budgetGoals:{},
    incomeTypes:['Renda Principal','Renda Extra','Freelance','Investimento','Outros']
  };
}
function t(type,subtype,date,description,category,value){
  return {id:uuid(),type,subtype,date,description,category,value,month:date.slice(0,7),responsible:'Você',recurring:false,recurringMonths:0};
}
function loadData(){
  const saved = storage.get(KEY);
  if(saved && saved.version){
    migrate(saved);
    return saved;
  }
  const d = demoData(); storage.set(KEY,d); return d;
}
function migrate(d){
  d.version = d.version || 2;
  d.currentMonth = d.currentMonth || '2026-06';
  d.visualTheme = d.visualTheme || 'black';
  d.coupleMode = d.coupleMode || {enabled:false,name1:'Você',name2:'Parceiro(a)'};
  d.usdRate = d.usdRate || 5.85;
  d.transactions = d.transactions || [];
  d.categories = Array.isArray(d.categories) ? d.categories.map(c => typeof c==='string'?{name:c,color:'#95A5A6',rule:'ignorar'}:c) : demoData().categories;
  d.incomeTypes = d.incomeTypes || ['Renda Principal','Renda Extra','Freelance','Investimento','Outros'];
  d.budgetGoals = d.budgetGoals || {};
  d.patrimonio = d.patrimonio || demoData().patrimonio;
  ['liquidez','bens','investimentos','dividas'].forEach(k=>{
    if(typeof d.patrimonio[k] === 'number') d.patrimonio[k] = {total:d.patrimonio[k],items:[]};
    d.patrimonio[k].items = d.patrimonio[k].items || [];
    d.patrimonio[k].total = Number(d.patrimonio[k].total || 0);
  });
  d.patrimonioHistory = d.patrimonioHistory || [];
}
function save(){
  data.darkMode = document.body.classList.contains('dark');
  storage.set(KEY,data);
  storage.rawSet(DARK_KEY, data.darkMode ? 'true':'false');
  markSaved();
}
function markSaved(){
  if(!saveIndicator) return;
  saveIndicator.classList.add('show');
  clearTimeout(saveIndicatorTimer);
  saveIndicatorTimer = setTimeout(()=>saveIndicator.classList.remove('show'), 1100);
}
function applyDark(){
  const theme = data.visualTheme || 'black';
  document.body.classList.add('dark');
  document.body.classList.toggle('theme-black', theme === 'black');
  document.body.classList.toggle('theme-neon', theme === 'neon');
  data.darkMode = true;
}
function currentDate(){ return new Date().toISOString().slice(0,10); }
function dateFromMonth(m){ const [y,mo]=m.split('-').map(Number); return new Date(y,mo-1,1); }
function addMonths(month,delta){ const d = dateFromMonth(month); d.setMonth(d.getMonth()+delta); return d.toISOString().slice(0,7); }
function monthHuman(m){ const s = monthFmt.format(dateFromMonth(m)); return s.charAt(0).toUpperCase()+s.slice(1); }
function monthAbbr(m){ return monthShortFmt.format(dateFromMonth(m)).replace('.','').slice(0,3).replace(/^./,c=>c.toUpperCase()); }
function brDate(date){ const [y,m,d]=date.split('-'); return `${d}/${m}`; }
function brDateFull(date){ return dateLongFmt.format(new Date(date+'T12:00:00')); }
function money(v, opts={}){
  if(hideValues) return '<span class="hidden-money">••••••</span>';
  const abs = Math.abs(Number(v)||0);
  let out = fmt.format(abs);
  if(opts.usd){ out = 'US$ ' + (abs / (data.usdRate || 5.85)).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  if(opts.sign === 'neg') return '−' + out;
  if(opts.sign === 'pos') return '+' + out;
  if(Number(v)<0) return '−' + out;
  return out;
}
function parseMoney(str){
  if(typeof str === 'number') return str;
  const cleaned = String(str||'').replace(/[^\d,-]/g,'').replace(/\./g,'').replace(',','.');
  return Number(cleaned) || 0;
}
function maskMoneyInput(input){
  let digits = input.value.replace(/\D/g,'');
  if(!digits) { input.value=''; return; }
  const num = Number(digits) / 100;
  input.value = fmt.format(num);
}
function categoryObj(name){
  const c = data.categories.find(c=>c.name===name);
  if(c) return c;
  if(investColors[name]) return {name, color:investColors[name], rule:'investimento'};
  if(data.incomeTypes.includes(name)) return {name, color: name==='Renda Principal'?'#27AE60': name==='Renda Extra'?'#3498DB': name==='Freelance'?'#9B59B6':'#95A5A6', rule:'ignorar'};
  return {name, color:'#95A5A6', rule:'ignorar'};
}
function badge(name){
  const c = categoryObj(name);
  const bg = hexToRgba(c.color,.15);
  const icon = categoryEmoji[name] ? categoryEmoji[name] + ' ' : '';
  return `<span class="badge" style="background:${bg};color:${c.color}">${icon}${escapeHtml(name)}</span>`;
}
function hexToRgba(hex,alpha){
  const h=String(hex||'#95A5A6').replace('#','');
  const bigint=parseInt(h.length===3?h.split('').map(x=>x+x).join(''):h,16);
  const r=(bigint>>16)&255,g=(bigint>>8)&255,b=bigint&255;
  return `rgba(${r},${g},${b},${alpha})`;
}
function escapeHtml(s){ return String(s??'').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
function sum(list){ return list.reduce((a,b)=>a+Number(b.value||0),0); }
function monthTx(month=data.currentMonth){ return data.transactions.filter(x=>x.month===month); }
function expenses(tx=monthTx()){ return tx.filter(x=>x.type==='despesa' && (x.subtype==='fixa'||x.subtype==='variavel')); }
function variableExpenses(tx=monthTx()){ return tx.filter(x=>x.type==='despesa' && x.subtype==='variavel'); }
function fixedExpenses(tx=monthTx()){ return tx.filter(x=>x.type==='despesa' && x.subtype==='fixa'); }
function incomes(tx=monthTx()){ return tx.filter(x=>x.type==='receita'); }
function aportes(tx=monthTx()){ return tx.filter(x=>x.subtype==='aporte'); }
function totals(month=data.currentMonth){
  const tx = monthTx(month);
  const receita = sum(incomes(tx));
  const despesa = sum(expenses(tx));
  const investir = sum(aportes(tx));
  return {receita,despesa,investir,saldo:receita-despesa};
}
function patrimonioTotal(){
  const p=data.patrimonio; return Number(p.liquidez.total||0)+Number(p.bens.total||0)+Number(p.investimentos.total||0)-Number(p.dividas.total||0);
}
function savePatrimonioSnapshot(month=data.currentMonth){
  const total = patrimonioTotal();
  const existing = data.patrimonioHistory.find(h=>h.month===month);
  if(existing) existing.total = total;
  else data.patrimonioHistory.push({month,total});
  data.patrimonioHistory.sort((a,b)=>a.month.localeCompare(b.month));
  save();
}

function render(){
  applyDark();
  savePatrimonioSnapshot(data.currentMonth);
  renderHeader();
  renderNav();
  closeSpeed(false);
  if(view==='overview') renderOverview();
  if(view==='budget') renderBudget();
  if(view==='investments') renderInvestments();
  if(view==='patrimonio') renderPatrimonio();
  if(view==='settings') renderSettings();
}

function renderNav(){
  const items = [
    ['overview','◻','Visão geral'],['budget','⇄','Orçamento'],['investments','↗','Investimentos'],['patrimonio','◈','Patrimônio'],['logout','→','Sair']
  ];
  nav.innerHTML = items.map(([id,ic,lab])=>`<button class="nav-item ${view===id?'active':''}" data-nav="${id}"><span>${ic}</span>${lab}</button>`).join('');
  nav.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{
    const id = btn.dataset.nav;
    if(id==='logout') return logout();
    if(view!=='settings') previousView=id;
    view=id; render();
  });
}
function title(title){ return `<div class="screen-title"><h1>${title}</h1><button class="icon-btn eye" id="eyeToggle">${hideValues?'🙈':'👁'}</button></div>`; }
function bindEye(){ const e=document.getElementById('eyeToggle'); if(e) e.onclick=()=>{ hideValues=!hideValues; render(); }; }
function summaryGrid(){
  const t = totals();
  return `<div class="summary-grid">
    <div class="summary-card income"><div class="label">RECEITA</div><div class="value">${money(t.receita)}</div></div>
    <div class="summary-card invest"><div class="label">INVESTIR <span class="mini-toggle"><i></i></span></div><div class="value">${money(t.investir)}</div></div>
    <div class="summary-card expense"><div class="label">DESPESAS</div><div class="value">${money(t.despesa)}</div></div>
    <div class="summary-card balance ${t.saldo>=0?'positive':'negative'}"><div class="label">SALDO</div><div class="value">${money(t.saldo)}</div></div>
  </div>`;
}
function responsibleFilterHtml(){
  if(!data.coupleMode.enabled) return '';
  const names = ['Todos', data.coupleMode.name1 || 'Você', data.coupleMode.name2 || 'Parceiro(a)'];
  return `<div class="segment">${names.map(n=>`<button class="${responsibleFilter===n?'active':''}" data-resp="${escapeHtml(n)}">${escapeHtml(n)}</button>`).join('')}</div>`;
}
function bindResponsibleFilter(){
  document.querySelectorAll('[data-resp]').forEach(b=>b.onclick=()=>{ responsibleFilter=b.dataset.resp; render(); });
}
function applyResponsible(list){ return data.coupleMode.enabled && responsibleFilter!=='Todos' ? list.filter(x=>x.responsible===responsibleFilter) : list; }

function renderOverview(){

function ruleCard(){

function filteredTxForBudget(){
  let list = budgetSub==='receita' ? incomes(monthTx()) : budgetSub==='fixa' ? fixedExpenses(monthTx()) : variableExpenses(monthTx());
  list = applyResponsible(list);
  if(filter.period !== 'Mês atual') list = budgetSub==='receita' ? incomes(data.transactions) : budgetSub==='fixa' ? fixedExpenses(data.transactions) : variableExpenses(data.transactions);
  list = applyPeriod(list);
  if(data.coupleMode.enabled && responsibleFilter!=='Todos') list = list.filter(x=>x.responsible===responsibleFilter);
  if(filter.search) list = list.filter(x=>x.description.toLowerCase().includes(filter.search.toLowerCase()));
  if(filter.categories.length) list = list.filter(x=>filter.categories.includes(x.category));
  return list.sort((a,b)=>b.date.localeCompare(a.date));
}
function applyPeriod(list){
  const nowM = data.currentMonth;
  if(filter.period==='Mês atual') return list.filter(x=>x.month===nowM);
  if(filter.period==='Mês anterior') return list.filter(x=>x.month===addMonths(nowM,-1));
  const now = dateFromMonth(nowM); const start = new Date(now);
  if(filter.period==='Últimos 30 dias'){ const d=new Date(); d.setDate(d.getDate()-30); return list.filter(x=>new Date(x.date+'T12:00:00')>=d); }
  if(filter.period==='Último semestre'){ start.setMonth(start.getMonth()-5); const s=start.toISOString().slice(0,7); return list.filter(x=>x.month>=s && x.month<=nowM); }
  if(filter.period==='Ano atual'){ const y=nowM.slice(0,4); return list.filter(x=>x.month.startsWith(y)); }
  if(filter.period==='Ano passado'){ const y=String(Number(nowM.slice(0,4))-1); return list.filter(x=>x.month.startsWith(y)); }
  return list;
}
function filterChips(){
  const arr=[];
  if(filter.search) arr.push({k:'search',t:`Busca: ${filter.search}`});
  filter.categories.forEach(c=>arr.push({k:'cat:'+c,t:c}));
  if(filter.period !== 'Mês atual') arr.push({k:'period',t:filter.period});
  if(!arr.length) return '';
  return `<div class="filter-chips">${arr.map(x=>`<button class="chip active" data-remove-filter="${escapeHtml(x.k)}">${escapeHtml(x.t)} ×</button>`).join('')}</div>`;
}

function forecastHtml(){

function filterSummary(list){
  const active = filter.search || filter.categories.length || filter.period!=='Mês atual';
  if(!active || budgetSub==='receita') return '';
  const groups = groupByCategory(list);
  const total = Object.values(groups).reduce((a,b)=>a+b,0);

    return `<div class="progress-line"><div class="progress-top"><span>${badge(cat)}</span><span>${money(val,{sign:'neg'})}</span></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${c}"></div></div></div>`;
  }).join('')}</div>`;

function groupByCategory(list){ return list.reduce((o,x)=>{ o[x.category]=(o[x.category]||0)+Number(x.value||0); return o; },{}); }
function removeFilter(k){
  if(k==='search') filter.search='';

  else if(k.startsWith('cat:')) filter.categories=filter.categories.filter(c=>c!==k.slice(4));

      <div class="card" style="box-shadow:none;margin:12px 0;background:rgba(30,123,75,.08)"><div class="muted" style="font-size:12px;font-weight:900">Você atingirá sua meta em</div><div id="simResult" style="font-size:21px;font-weight:900;margin-top:6px"></div><div id="simValue" class="small-note"></div></div>

    </div>`;

function investmentSeries(){
  const months = [...new Set(data.transactions.filter(x=>x.subtype==='aporte').map(x=>x.month).concat(data.patrimonioHistory.map(h=>h.month)))].sort().slice(-8);
  let base = Math.max(0,(data.patrimonio.investimentos.total || 0) - sum(data.transactions.filter(x=>x.subtype==='aporte' && x.month>months[0])));
  let running = 0;
  return months.map(m=>{ running += sum(data.transactions.filter(x=>x.subtype==='aporte' && x.month===m)); return {label:monthAbbr(m), value:Math.max(0,base + running)}; });
}
function averageMonthlyAporte(){
  const groups = data.transactions.filter(x=>x.subtype==='aporte').reduce((o,x)=>{o[x.month]=(o[x.month]||0)+x.value;return o;},{});
  const vals=Object.values(groups); return vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
}
function updateSimulator(){
  const pv=parseMoney(document.getElementById('simPV').value), pmt=parseMoney(document.getElementById('simPMT').value), annual=(Number(document.getElementById('simRate').value)||0)/100, goal=parseMoney(document.getElementById('simGoal').value);
  const r=Math.pow(1+annual,1/12)-1;
  let n=0, fv=pv; const points=[];
  while(fv<goal && n<720){
    fv = r===0 ? fv+pmt : fv*(1+r)+pmt;
    n++;
    if(n%12===0 || fv>=goal) points.push({label:String(Math.ceil(n/12))+'a',value:fv});
  }
  const y=Math.floor(n/12), m=n%12;
  document.getElementById('simResult').textContent = `${y} anos e ${m} meses`;
  document.getElementById('simValue').innerHTML = `com patrimônio estimado de <strong>${money(fv)}</strong>`;
  drawLine('simLine',points.length?points:[{label:'Hoje',value:pv},{label:'Meta',value:goal}],'simTip');
}

function deleteCategory(name){
  if(data.transactions.some(x=>x.category===name)) return toast('Não é possível excluir: há transações vinculadas','error');
  if(!confirm(`Excluir a categoria ${name}?`)) return;
  data.categories=data.categories.filter(c=>c.name!==name); delete data.budgetGoals[name]; save(); toast('Categoria excluída'); renderSettings();
}

      ${data.coupleMode.enabled?`<div class="field"><label>Responsável</label><select id="txResp"><option ${tx?.responsible===(data.coupleMode.name1||'Você')?'selected':''}>${escapeHtml(data.coupleMode.name1||'Você')}</option><option ${tx?.responsible===(data.coupleMode.name2||'Parceiro(a)')?'selected':''}>${escapeHtml(data.coupleMode.name2||'Parceiro(a)')}</option></select></div>`:''}

      <div class="modal-actions">${tx?'<button type="button" class="btn danger" id="deleteTx">Excluir</button>':''}<button type="button" class="btn ghost" data-close>Cancelar</button><button class="btn primary" id="saveTx" disabled>${tx?'Salvar':'Adicionar'}</button></div>
    </form>`);
  const form=document.getElementById('txForm'), val=document.getElementById('txValue'), rec=document.getElementById('txRecurring');
  val.addEventListener('input',()=>{ maskMoneyInput(val); validateTxForm(); });
  ['txDate','txDesc'].forEach(id=>document.getElementById(id).addEventListener('input',validateTxForm));
  if(rec) rec.onclick=()=>{ if(rec.dataset.forced==='1') return; rec.classList.toggle('active'); document.getElementById('recMonthsWrap').style.display=rec.classList.contains('active')?'block':'none'; };
  setupAutocomplete(document.getElementById('txDesc'));
  function validateTxForm(){
    const okDate=!!document.getElementById('txDate').value;
    const okDesc=document.getElementById('txDesc').value.trim().length>=2;
    const okVal=parseMoney(val.value)>0;
    setErr('txDate',okDate?'':'Informe a data'); setErr('txDesc',okDesc?'':'Mínimo 2 caracteres'); setErr('txValue',okVal?'':'Informe valor maior que zero');
    document.getElementById('saveTx').disabled=!(okDate&&okDesc&&okVal);
  }
  validateTxForm();
  form.onsubmit=(e)=>{ e.preventDefault(); if(document.getElementById('saveTx').disabled) return; const base={
      id: tx?.id || uuid(), type, subtype, date:document.getElementById('txDate').value, description:document.getElementById('txDesc').value.trim(), category:document.getElementById('txCat').value, value:parseMoney(val.value), month:document.getElementById('txDate').value.slice(0,7), responsible:data.coupleMode.enabled?document.getElementById('txResp').value:'Você', recurring: tx?.recurring || false, recurringMonths: tx?.recurringMonths || 0
    };
    if(isFixed) base.dueDay=Number(document.getElementById('txDue').value)||1;
    if(tx) updateTransaction(tx,base); else addTransaction(base, rec?.classList.contains('active') || false, Number(document.getElementById('txRecMonths')?.value||1));
    closeModal(); render(); toast(isIncome?'Receita salva':'Despesa salva'); if(type==='despesa') checkGoalNotifications(base.category);
  };

function addTransaction(base, recurring, months){
  const groupId = recurring ? uuid() : null;
  if(recurring){ base.recurring=true; base.recurringGroupId=groupId; base.recurringMonths=months; }
  data.transactions.push(base);
  if(recurring && months>1){
    for(let i=1;i<months;i++){
      const copy={...base,id:uuid(),date:addMonths(base.month,i)+'-'+base.date.slice(8,10),month:addMonths(base.month,i),recurringGroupId:groupId};
      data.transactions.push(copy);
    }
  }
  save();
}
function updateTransaction(oldTx, base){
  const group=oldTx.recurringGroupId;
  if(group && confirm('Este lançamento é recorrente. Aplicar alteração neste mês e nos próximos?')){
    data.transactions = data.transactions.map(x=> x.recurringGroupId===group && x.month>=oldTx.month ? {...x, description:base.description, category:base.category, value:base.value, responsible:base.responsible, dueDay:base.dueDay??x.dueDay} : x);
  } else {
    const idx=data.transactions.findIndex(x=>x.id===oldTx.id); if(idx>=0) data.transactions[idx]={...oldTx,...base};
  }
  save();
}
function deleteTransaction(tx){
  let delGroup=false;
  if(tx.recurringGroupId) delGroup=confirm('Excluir este e os próximos lançamentos recorrentes? Cancelar = somente este mês.');
  if(!tx.recurringGroupId || !delGroup){ if(!confirm('Excluir este lançamento?')) return; data.transactions=data.transactions.filter(x=>x.id!==tx.id); }
  else data.transactions=data.transactions.filter(x=>!(x.recurringGroupId===tx.recurringGroupId && x.month>=tx.month));
  closeModal(); save(); render(); toast('Lançamento excluído');
}

function openModal(html){
  modalOverlay.innerHTML = `<div class="modal-card"><button class="close-modal" data-close>×</button>${html}</div>`;
  modalOverlay.classList.add('show'); document.body.classList.add('modal-open');
  modalOverlay.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal);
  modalOverlay.onclick=e=>{ if(e.target===modalOverlay) closeModal(); };
}
function closeModal(){ modalOverlay.classList.remove('show'); modalOverlay.innerHTML=''; document.body.classList.remove('modal-open'); }
function setErr(field,msg){ const e=document.querySelector(`[data-err="${field}"]`); if(e) e.textContent=msg; }
function setupAutocomplete(input){
  const box = input.closest('.auto-wrap').querySelector('.autocomplete');
  input.addEventListener('input',()=>{
    const q=input.value.trim().toLowerCase(); if(q.length<2){ box.style.display='none'; return; }
    const opts=[...new Set(data.transactions.map(x=>x.description).filter(Boolean))].filter(d=>d.toLowerCase().includes(q) && d.toLowerCase()!==q).slice(0,5);
    box.innerHTML=opts.map(o=>`<button type="button">${escapeHtml(o)}</button>`).join(''); box.style.display=opts.length?'block':'none';
    box.querySelectorAll('button').forEach(b=>b.onclick=()=>{ input.value=b.textContent; box.style.display='none'; input.dispatchEvent(new Event('input')); });
  });
}
function toast(msg,type='success'){
  const div=document.createElement('div'); div.className=`toast ${type}`; div.textContent=(type==='success'?'✅ ':'❌ ')+msg; toastWrap.appendChild(div); setTimeout(()=>div.remove(),3100);
}

  const canvas=document.getElementById(canvasId); if(!canvas) return; const ctx=canvas.getContext('2d'); const rect=canvas.parentElement.getBoundingClientRect(); const dpr=window.devicePixelRatio||1; canvas.width=rect.width*dpr; canvas.height=rect.height*dpr; ctx.scale(dpr,dpr); const w=rect.width,h=rect.height; ctx.clearRect(0,0,w,h);

function drawDonut(list, canvasId){

function drawDonutData(canvasId,items,tipId){
  const canvas=document.getElementById(canvasId); if(!canvas) return; const ctx=canvas.getContext('2d'); const rect=canvas.parentElement.getBoundingClientRect(); const dpr=window.devicePixelRatio||1; canvas.width=rect.width*dpr; canvas.height=rect.height*dpr; ctx.scale(dpr,dpr); const w=rect.width,h=rect.height; ctx.clearRect(0,0,w,h);
  const total=items.reduce((a,b)=>a+b.value,0); if(!total){ ctx.fillStyle=getCSS('--texto-secundario'); ctx.font='bold 13px Inter'; ctx.textAlign='center'; ctx.fillText('Sem dados',w/2,h/2); return; }
  const cx=w/2,cy=h/2,r=Math.min(w,h)*.36,inner=r*.55; let start=-Math.PI/2; const seg=[];
  items.forEach((it,idx)=>{ const ang=it.value/total*Math.PI*2, gap=.018; const end=start+ang; const mid=(start+end)/2; const scale=idx===selectedDonutIndex?1.05:1; const ox=Math.cos(mid)*(scale-1)*8, oy=Math.sin(mid)*(scale-1)*8; ctx.beginPath(); ctx.arc(cx+ox,cy+oy,r*scale,start+gap,end-gap); ctx.arc(cx+ox,cy+oy,inner*scale,end-gap,start+gap,true); ctx.closePath(); ctx.fillStyle=it.color; ctx.fill(); seg.push({...it,start,end,pct:it.value/total*100}); start=end; });
  ctx.fillStyle=getCSS('--branco'); ctx.beginPath(); ctx.arc(cx,cy,inner-2,0,Math.PI*2); ctx.fill(); ctx.fillStyle=getCSS('--texto-principal'); ctx.font='800 16px Inter'; ctx.textAlign='center'; ctx.fillText(hideValues?'••••':fmt.format(total),cx,cy+4); activeDonutSegments=seg;
  canvas.onclick=e=>{ const pos=getCanvasPos(canvas,e), dx=pos.x-cx, dy=pos.y-cy, dist=Math.hypot(dx,dy); if(dist<inner||dist>r+18) return; let a=Math.atan2(dy,dx); if(a<-Math.PI/2) a+=Math.PI*2; a+=Math.PI/2; const orig=Math.atan2(dy,dx); let real=orig; if(real < -Math.PI/2) real += Math.PI*2; const angle=real; const found=seg.findIndex(s=>angle>=s.start && angle<=s.end); if(found>=0){ selectedDonutIndex=found; drawDonutData(canvasId,items,tipId); showCanvasTip(tipId,pos.x,pos.y,`${seg[found].cat}: ${Math.round(seg[found].pct)}% · ${fmt.format(seg[found].value)}`); } };
}
function drawLine(canvasId,points,tipId){
  const canvas=document.getElementById(canvasId); if(!canvas) return; const ctx=canvas.getContext('2d'); const rect=canvas.parentElement.getBoundingClientRect(); const dpr=window.devicePixelRatio||1; canvas.width=rect.width*dpr; canvas.height=rect.height*dpr; ctx.scale(dpr,dpr); const w=rect.width,h=rect.height; ctx.clearRect(0,0,w,h);
  points=(points||[]).filter(p=>isFinite(p.value)); if(!points.length){ ctx.fillStyle=getCSS('--texto-secundario'); ctx.font='bold 13px Inter'; ctx.textAlign='center'; ctx.fillText('Sem dados',w/2,h/2); return; }
  const pad=34, top=20, bottom=34; const max=Math.max(...points.map(p=>p.value),1), min=Math.min(...points.map(p=>p.value),0); const span=max-min||1;
  const pts=points.map((p,i)=>({x:pad+(w-pad*2)*(points.length===1?0.5:i/(points.length-1)),y:top+(h-top-bottom)*(1-(p.value-min)/span),...p}));
  ctx.strokeStyle=getCSS('--borda'); ctx.lineWidth=1; for(let i=0;i<4;i++){ const y=top+i*(h-top-bottom)/3; ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(w-pad,y); ctx.stroke(); }
  const grad=ctx.createLinearGradient(0,top,0,h-bottom); grad.addColorStop(0,'rgba(30,123,75,.20)'); grad.addColorStop(1,'rgba(30,123,75,0)'); ctx.beginPath(); ctx.moveTo(pts[0].x,h-bottom); pts.forEach((p,i)=>{ if(i===0) ctx.lineTo(p.x,p.y); else { const prev=pts[i-1]; const mx=(prev.x+p.x)/2; ctx.bezierCurveTo(mx,prev.y,mx,p.y,p.x,p.y); } }); ctx.lineTo(pts[pts.length-1].x,h-bottom); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); pts.forEach((p,i)=>{ if(i===0) ctx.moveTo(p.x,p.y); else { const prev=pts[i-1]; const mx=(prev.x+p.x)/2; ctx.bezierCurveTo(mx,prev.y,mx,p.y,p.x,p.y); } }); ctx.strokeStyle='#1E7B4B'; ctx.lineWidth=3; ctx.stroke();
  ctx.fillStyle='#1E7B4B'; pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();});

function roundedRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h); ctx.lineTo(x,y+h); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }
function getCSS(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function shortMoney(v){ if(hideValues) return '••••'; const n=Number(v)||0; if(Math.abs(n)>=1000000) return 'R$ '+(n/1000000).toLocaleString('pt-BR',{maximumFractionDigits:1})+' mi'; if(Math.abs(n)>=1000) return 'R$ '+(n/1000).toLocaleString('pt-BR',{maximumFractionDigits:1})+' mil'; return 'R$ '+Math.round(n); }

  data.transactions = data.transactions.filter(x=>x.month !== data.currentMonth);

}

function requestNotificationsIfNeeded(){
  if('Notification' in window && Notification.permission === 'default' && Object.values(data.budgetGoals).some(v=>Number(v)>0)) Notification.requestPermission().catch(()=>{});
}
function checkGoalNotifications(category){
  const goal=Number(data.budgetGoals[category]||0); if(!goal) return; const spent=sum(variableExpenses(monthTx()).filter(x=>x.category===category)); const pct=spent/goal*100;
  const key80=category+'80'+data.currentMonth, key100=category+'100'+data.currentMonth;
  if(pct>=100 && !notifiedGoals.has(key100)){ notify(`🚨 ${category}: meta ultrapassada!`); notifiedGoals.add(key100); }
  else if(pct>=80 && !notifiedGoals.has(key80)){ notify(`⚠️ ${category}: ${Math.round(pct)}% da meta atingida`); notifiedGoals.add(key80); }
}
function notify(msg){
  toast(msg.replace(/[⚠️🚨]/g,''));
  if('Notification' in window && Notification.permission === 'granted') new Notification('NEONVAULT', {body:msg});
}

  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); const d=new Date().toISOString().slice(0,10); a.href=URL.createObjectURL(blob); a.download=`neonvault_backup_${d}.json`; a.click(); URL.revokeObjectURL(a.href); toast('Backup exportado');
}
function importData(e){
  const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{ try{ const obj=JSON.parse(reader.result); if(!obj.version || !Array.isArray(obj.transactions) || !obj.patrimonio) throw new Error('Estrutura inválida'); if(!confirm('Isso substituirá todos os dados atuais. Continuar?')) return; migrate(obj); data=obj; save(); toast('Dados importados'); render(); }catch(err){ toast('Arquivo inválido','error'); } }; reader.readAsText(file);
}

function buildAlerts(){

  if(t.saldo < 0) res.push({icon:'🚨', title:'Saldo negativo', text:'Suas despesas do mês ultrapassaram a receita. Vale segurar gastos até fechar o mês.'});
  if(t.receita===0) res.push({icon:'💡', title:'Receitas ainda zeradas', text:'Você ainda não lançou entradas neste mês. Adicione salário, renda extra ou freelas.'});
  if(prev.despesa>0 && t.despesa > prev.despesa) res.push({icon:'📈', title:'Gastos acima do mês passado', text:`Você gastou ${money(t.despesa-prev.despesa)} a mais do que em ${monthHuman(addMonths(data.currentMonth,-1))}.`});
  Object.entries(data.budgetGoals||{}).forEach(([cat,goal])=>{ const spent=sum(variableExpenses(monthTx()).filter(x=>x.category===cat)); const pct=goal?spent/goal*100:0; if(pct>=100) res.push({icon:'⚠️', title:`Meta estourada em ${cat}`, text:`Você já usou ${Math.round(pct)}% da meta de ${cat}.`}); else if(pct>=80) res.push({icon:'🟠', title:`Meta quase no limite`, text:`${cat} já consumiu ${Math.round(pct)}% do teto mensal.`}); });

  if(!res.length) res.push({icon:'✅', title:'Tudo sob controle', text:'Seu painel está limpo. Continue adicionando gastos para receber alertas inteligentes.'});
  return res.slice(0,5);
}
function financeScore(){
  const t = totals(); let score = 55;
  if(t.saldo >= 0) score += 15; else score -= 18;
  if(t.receita>0 && t.despesa <= t.receita*0.7) score += 10; else if(t.receita>0 && t.despesa > t.receita) score -= 12;
  if(t.investir > 0) score += 10;
  const debtRatio = patrimonioTotal() > 0 ? (data.patrimonio.dividas.total || 0) / patrimonioTotal() : 0.5;
  if(debtRatio < 0.2) score += 10; else if(debtRatio > 0.4) score -= 10;
  const goals = data.vaultGoals || [];
  if(goals.length){ const avg = goals.reduce((a,g)=>a+((Number(g.current||0)/Math.max(Number(g.target||1),1))*100),0)/goals.length; if(avg>=50) score += 6; }
  score = Math.max(0, Math.min(100, Math.round(score)));
  const label = score>=85 ? 'Excelente' : score>=70 ? 'Bom controle' : score>=55 ? 'Atenção moderada' : 'Zona de alerta';
  const tip = score>=85 ? 'Seu caixa está saudável e seus hábitos estão consistentes.' : score>=70 ? 'Você está bem, mas ainda dá para otimizar metas e aportes.' : score>=55 ? 'Seu mês pede mais disciplina em categorias variáveis.' : 'É hora de reduzir gastos e reorganizar prioridades.';
  return {score,label,tip};
}
function monthlyInsight(){
  const t=totals(); const prev=totals(addMonths(data.currentMonth,-1)); const [bigCat,bigVal]=biggestCategory();
  const delta = t.saldo - prev.saldo;
  const best = t.investir>0 ? 'Você conseguiu manter aportes neste mês.' : t.saldo>=0 ? 'Seu saldo está positivo até aqui.' : 'Vale priorizar despesas essenciais primeiro.';
  return {
    topExpense: bigVal ? `${bigCat} (${money(bigVal,{sign:'neg'})})` : 'Sem gastos relevantes',
    deltaText: prev.receita || prev.despesa ? `${delta>=0?'Melhora':'Piora'} de ${money(Math.abs(delta))} no saldo em relação ao mês passado.` : 'Sem comparação suficiente com o mês anterior.',
    best,
    attention: t.saldo<0 ? 'Seu saldo atual está negativo.' : bigCat==='Delivery' ? 'Delivery está puxando seus gastos.' : 'Continue acompanhando metas e assinaturas.'
  };
}

function renderCreditCards(){
  if(!data.creditCards.length) return `<div class="empty">Nenhum cartão cadastrado. Adicione cartões para acompanhar limite, fatura e compras parceladas.</div>`;
  return `<div class="soft-list">${data.creditCards.map(card=>{ const invoice = cardInvoice(card), outstanding=cardOutstanding(card), available=Math.max(0, Number(card.limit||0)-outstanding); return `<div class="soft-row"><div class="top"><div><div class="name">${escapeHtml(card.name)}</div><div class="muted" style="font-size:12px">Fecha dia ${card.closingDay} · vence dia ${card.dueDay}</div></div><div><button class="edit-btn" data-card-edit="${card.id}">✏</button></div></div><div class="credit-metrics"><div class="metric"><span>Fatura</span><strong>${money(invoice,{sign:'neg'})}</strong></div><div class="metric"><span>Disponível</span><strong>${money(available)}</strong></div><div class="metric"><span>Em aberto</span><strong>${money(outstanding,{sign:'neg'})}</strong></div></div><div class="small-actions"><button class="btn primary small" data-card-buy="${card.id}">+ Compra</button></div></div>`; }).join('')}</div>`;
}
function splitInstallments(total, count){ const cents=Math.round(total*100); const base=Math.floor(cents/count); let rem=cents-base*count; const arr=[]; for(let i=0;i<count;i++){ let c=base; if(rem>0){ c++; rem--; } arr.push(c/100); } return arr; }
function showInstallmentExpenseModal(kind='expense', cardId=''){
  const withCard = kind==='card';
  openModal(`<h2>${withCard?'Nova compra no cartão':'Nova despesa parcelada'}</h2><p class="sub">Crie lançamentos mensais automaticamente.</p><form id="instForm"><div class="field"><label>Data da compra</label><input id="instDate" type="date" value="${currentDate()}"><div class="error" data-err="instDate"></div></div>${withCard?`<div class="field"><label>Cartão</label><select id="instCard">${data.creditCards.map(c=>`<option value="${c.id}" ${cardId===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}</select></div>`:''}<div class="field auto-wrap"><label>Descrição</label><input id="instDesc" autocomplete="off" placeholder="Ex: Notebook"><div class="autocomplete"></div><div class="error" data-err="instDesc"></div></div><div class="field"><label>Categoria</label><select id="instCat">${data.categories.map(c=>`<option>${escapeHtml(c.name)}</option>`).join('')}</select></div><div class="inline-fields"><div class="field"><label>Valor total</label><input id="instTotal" inputmode="decimal" placeholder="R$ 0,00"><div class="error" data-err="instTotal"></div></div><div class="field"><label>Parcelas</label><input id="instCount" type="number" min="2" max="48" value="2"><div class="error" data-err="instCount"></div></div></div><div class="modal-actions"><button type="button" class="btn ghost" data-close>Cancelar</button><button class="btn primary" id="instSave" disabled>Adicionar</button></div></form>`);
  setupAutocomplete(document.getElementById('instDesc'));
  document.getElementById('instDesc').addEventListener('input',()=>{ const guess=suggestCategory(document.getElementById('instDesc').value); if(guess && data.categories.some(c=>c.name===guess)) document.getElementById('instCat').value=guess; validateInst(); });
  ['instDate','instTotal','instCount'].forEach(id=>document.getElementById(id).addEventListener('input',e=>{ if(id==='instTotal') maskMoneyInput(e.target); validateInst(); }));
  function validateInst(){ const okDate=!!document.getElementById('instDate').value; const okDesc=document.getElementById('instDesc').value.trim().length>=2; const okTotal=parseMoney(document.getElementById('instTotal').value)>0; const count=Number(document.getElementById('instCount').value); const okCount=count>=2 && count<=48; setErr('instDate',okDate?'':'Informe a data'); setErr('instDesc',okDesc?'':'Mínimo 2 caracteres'); setErr('instTotal',okTotal?'':'Informe o valor'); setErr('instCount',okCount?'':'Entre 2 e 48 parcelas'); document.getElementById('instSave').disabled=!(okDate&&okDesc&&okTotal&&okCount); }
  validateInst();
  document.getElementById('instForm').onsubmit=(e)=>{ e.preventDefault(); if(document.getElementById('instSave').disabled) return; const date=document.getElementById('instDate').value; const baseMonth=date.slice(0,7); const vals=splitInstallments(parseMoney(document.getElementById('instTotal').value), Number(document.getElementById('instCount').value)); const gid=uuid(); vals.forEach((v,i)=>{ const m=addMonths(baseMonth,i); const day=Math.min(Number(date.slice(8,10)), monthSpan(m)); data.transactions.push({ id:uuid(), type:'despesa', subtype:'variavel', date:monthDate(m,day), description:`${document.getElementById('instDesc').value.trim()} ${i+1}/${vals.length}`, category:document.getElementById('instCat').value, value:v, month:m, responsible:data.coupleMode.name1||'Você', recurring:false, recurringMonths:0, installmentGroupId:gid, installmentIndex:i+1, installmentTotal:vals.length, cardId:withCard?document.getElementById('instCard').value:null }); }); save(); closeModal(); render(); toast(withCard?'Compra parcelada adicionada':'Despesa parcelada adicionada'); };
}
function antiSpendAdvice(value){
  const t=totals(); const free=Math.max(0, t.saldo - t.investir); const pct = free ? (value/free*100) : 999;
  if(value<=free*0.2) return {title:'Pode comprar com tranquilidade', text:`Esse gasto consome cerca de ${Math.round(pct)}% do seu saldo livre atual.`, tone:'success'};
  if(value<=free) return {title:'Pode comprar, mas com atenção', text:`O valor usa ${Math.round(pct)}% do saldo livre do mês. Veja se não atrapalha metas e aportes.`, tone:'warn'};
  return {title:'Melhor evitar agora', text:'Essa compra ultrapassa o saldo livre disponível neste mês e pode comprometer seu orçamento.', tone:'error'};
}
function showAntiSpendModal(){
  openModal(`<h2>Modo anti gasto</h2><p class="sub">Descubra se uma compra cabe no seu mês antes de gastar.</p><form id="antiForm"><div class="field"><label>Valor da compra</label><input id="antiValue" inputmode="decimal" placeholder="R$ 0,00"><div class="error" data-err="antiValue"></div></div><div class="card walk-card" id="antiResult" style="box-shadow:none;margin-top:12px"><strong>Digite um valor para receber o conselho.</strong><p class="muted" style="margin:6px 0 0">O cálculo considera o saldo do mês e seus aportes.</p></div><div class="modal-actions"><button type="button" class="btn ghost" data-close>Fechar</button><button class="btn primary" id="antiCheck" disabled>Analisar</button></div></form>`);
  const inp=document.getElementById('antiValue'); inp.addEventListener('input',()=>{ maskMoneyInput(inp); const ok=parseMoney(inp.value)>0; setErr('antiValue',ok?'':'Informe um valor maior que zero'); document.getElementById('antiCheck').disabled=!ok; if(ok) renderAdvice(); });
  function renderAdvice(){ const v=parseMoney(inp.value); const res=antiSpendAdvice(v); document.getElementById('antiResult').innerHTML=`<strong>${res.title}</strong><p class="muted" style="margin:6px 0 0">${res.text}</p>`; }
  document.getElementById('antiForm').onsubmit=(e)=>{ e.preventDefault(); renderAdvice(); };
}
function showWelcomeOnboarding(){
  if(data.onboardingSeen || __enhancedNeonvaultState.onboardingShown) return;
  __enhancedNeonvaultState.onboardingShown = true;
  openModal(`<div class="onboard-hero"><div class="big">NEONVAULT</div><p class="sub">Seu cofre financeiro cyberpunk está pronto.</p></div><div class="onboard-grid"><div class="mini">💾 Salvamento automático local</div><div class="mini">🎯 Cofres, metas e score</div><div class="mini">💳 Cartões e parcelamentos</div><div class="mini">📄 Relatórios e backup</div></div><div class="small-note" style="margin-bottom:14px">Use o botão + para lançar receitas/despesas e explore as novas ferramentas de planejamento.</div><div class="modal-actions"><button class="btn primary wide-btn" id="startOnboard">Começar agora</button></div>`);
  document.getElementById('startOnboard').onclick=()=>{ data.onboardingSeen=true; save(); closeModal(); };
}
function showPinGate(){
  if(!data.pinLock?.enabled || __enhancedNeonvaultState.pinUnlocked) return;
  modalOverlay.classList.add('show'); document.body.classList.add('modal-open');
  modalOverlay.innerHTML = `<div class="lock-overlay"><div class="lock-card"><div class="badge-soft">🔐 Cofre protegido</div><h2>Desbloquear NEONVAULT</h2><p>Digite seu PIN de 4 dígitos para acessar seu painel financeiro.</p><div class="field"><label>PIN</label><input id="pinInput" type="password" inputmode="numeric" maxlength="4" placeholder="••••"></div><div class="error" id="pinErr"></div><div class="modal-actions"><button class="btn primary wide-btn" id="pinUnlock">Entrar</button></div></div></div>`;
  const inp=document.getElementById('pinInput'); inp.focus();
  document.getElementById('pinUnlock').onclick=()=>{ if(inp.value===String(data.pinLock.pin||'')){ __enhancedNeonvaultState.pinUnlocked=true; closeModal(); } else { document.getElementById('pinErr').textContent='PIN incorreto'; inp.value=''; inp.focus(); } };
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('pinUnlock').click(); });
}
function enhanceOverview(){
  const special = app.querySelector('.special-card');
  if(!special) return;
  const score = financeScore(); const alerts = buildAlerts(); const insight = monthlyInsight();
  special.insertAdjacentHTML('afterend', `
    <div class="card section-card score-card"><div class="section-head"><h2>Score financeiro NEON</h2><span class="badge-soft">${score.label}</span></div><div class="score-wrap"><div class="score-ring" style="--scoreDeg:${score.score*3.6}deg"><div class="inner">${score.score}</div></div><div><strong style="font-size:18px">${score.label}</strong><p>${score.tip}</p></div></div></div>
    <div class="card section-card"><div class="section-head"><h2>Alertas inteligentes</h2><span class="muted" style="font-size:12px;font-weight:800">Atualizados em tempo real</span></div><div class="insight-list">${alerts.map(a=>`<div class="insight-item"><div class="ico">${a.icon}</div><div><strong>${a.title}</strong><div class="muted">${a.text}</div></div></div>`).join('')}</div></div>
    <div class="card section-card"><div class="section-head"><h2>Cofres e objetivos</h2><button class="btn primary small" id="addGoalBtn">+ Novo cofre</button></div>${renderGoalVaults()}</div>
    <div class="card section-card"><div class="section-head"><h2>Calendário financeiro</h2><span class="muted" style="font-size:12px;font-weight:800">Receitas, despesas e aportes</span></div>${renderMiniCalendar()}</div>
    <div class="card section-card"><div class="section-head"><h2>Dinheiro livre mês a mês</h2><span class="muted" style="font-size:12px;font-weight:800">Saldo dos últimos 6 meses</span></div><div class="chart-wrap small"><canvas id="freeBalanceLine"></canvas><div class="chart-tooltip" id="freeTip"></div></div></div>
    <div class="card section-card"><div class="section-head"><h2>Resumo do mês</h2><button class="btn ghost small" id="exportSummaryPdf">Exportar PDF</button></div><div class="month-summary"><div class="summary-box"><strong>Maior gasto</strong><p>${escapeHtml(insight.topExpense)}</p></div><div class="summary-box"><strong>Comparação</strong><p>${escapeHtml(insight.deltaText)}</p></div><div class="summary-box"><strong>Ponto positivo</strong><p>${escapeHtml(insight.best)}</p></div><div class="summary-box"><strong>Atenção</strong><p>${escapeHtml(insight.attention)}</p></div></div></div>
  `);
  document.getElementById('addGoalBtn').onclick=()=>showGoalModal();
  document.querySelectorAll('[data-edit-goal]').forEach(b=>b.onclick=()=>showGoalModal(data.vaultGoals.find(g=>g.id===b.dataset.editGoal)));
  document.querySelectorAll('[data-del-goal]').forEach(b=>b.onclick=()=>{ const g=data.vaultGoals.find(x=>x.id===b.dataset.delGoal); if(g && confirm(`Excluir o cofre ${g.name}?`)){ data.vaultGoals=data.vaultGoals.filter(x=>x.id!==g.id); save(); render(); toast('Cofre removido'); } });
  document.getElementById('exportSummaryPdf').onclick=exportMonthlyPdf;
  bindCalendarDays();
  setTimeout(()=>drawLine('freeBalanceLine', freeBalanceSeries(), 'freeTip'),0);
}
function enhanceBudget(){
  const budgetContent = document.getElementById('budgetContent');
  if(!budgetContent || document.getElementById('budgetEnhancer')) return;
  budgetContent.insertAdjacentHTML('beforebegin', `
    <div id="budgetEnhancer">
      <div class="card section-card"><div class="section-head"><h2>Central de gastos</h2><span class="muted" style="font-size:12px;font-weight:800">Ferramentas rápidas</span></div><div class="tool-grid"><button class="btn primary" id="antiSpendBtn">🧠 Posso comprar?</button><button class="btn ghost" id="newSubBtn">🔁 Nova assinatura</button><button class="btn ghost" id="newInstBtn">🧾 Parcela comum</button><button class="btn ghost" id="newCardBuyBtn">💳 Compra no cartão</button></div></div>
      <div class="card section-card"><div class="section-head"><h2>Contas recorrentes</h2><button class="btn primary small" id="subAddTop">+ Adicionar</button></div>${renderSubscriptionsCard()}</div>
      <div class="card section-card"><div class="section-head"><h2>Cartões de crédito</h2><div><button class="btn ghost small" id="newCardBtn">+ Novo cartão</button></div></div>${renderCreditCards()}</div>
    </div>`);
  document.getElementById('antiSpendBtn').onclick=showAntiSpendModal;
  document.getElementById('newSubBtn').onclick=()=>showSubscriptionModal();
  document.getElementById('subAddTop').onclick=()=>showSubscriptionModal();
  document.getElementById('newInstBtn').onclick=()=>showInstallmentExpenseModal('expense');
  document.getElementById('newCardBtn').onclick=()=>showCreditCardModal();
  document.getElementById('newCardBuyBtn').onclick=()=>{ if(!data.creditCards.length) return toast('Cadastre um cartão primeiro','error'); showInstallmentExpenseModal('card'); };
  document.querySelectorAll('[data-sub-edit]').forEach(b=>b.onclick=()=>showSubscriptionModal(data.subscriptions.find(s=>s.id===b.dataset.subEdit)));
  document.querySelectorAll('[data-sub-pay]').forEach(b=>b.onclick=()=>markSubscriptionPaid(b.dataset.subPay));
  document.querySelectorAll('[data-card-edit]').forEach(b=>b.onclick=()=>showCreditCardModal(data.creditCards.find(c=>c.id===b.dataset.cardEdit)));
  document.querySelectorAll('[data-card-buy]').forEach(b=>b.onclick=()=>showInstallmentExpenseModal('card', b.dataset.cardBuy));
}
function enhanceSettings(){
  if(document.getElementById('pinSectionCard')) return;
  app.insertAdjacentHTML('beforeend', `
    <div class="card settings-section" id="pinSectionCard"><h2>Proteção por PIN</h2><div class="toggle-row"><div><strong>Ativar bloqueio por PIN</strong><div class="pin-note">Ao abrir o app, será necessário informar um PIN de 4 dígitos.</div></div><button class="toggle ${data.pinLock?.enabled?'active':''}" id="pinToggle"></button></div><div id="pinFields" style="display:${data.pinLock?.enabled?'block':'none'};margin-top:12px"><div class="field"><label>PIN de 4 dígitos</label><input id="pinValue" type="password" maxlength="4" inputmode="numeric" value="${escapeHtml(data.pinLock?.pin||'')}"><div class="error" id="pinFieldErr"></div></div><button class="btn primary full" id="savePinBtn">Salvar PIN</button></div></div>
    <div class="card settings-section"><h2>Experiência</h2><button class="btn ghost full" id="reopenOnboarding">✨ Mostrar tela de boas-vindas novamente</button><div style="height:8px"></div><button class="btn ghost full" id="exportMonthPdfBtn">📄 Exportar resumo do mês em PDF</button></div>
  `);
  document.getElementById('pinToggle').onclick=()=>{ data.pinLock.enabled=!data.pinLock.enabled; if(!data.pinLock.enabled) data.pinLock.pin=''; save(); renderSettings(); toast('Proteção atualizada'); };
  const savePinBtn=document.getElementById('savePinBtn'); if(savePinBtn) savePinBtn.onclick=()=>{ const val=document.getElementById('pinValue').value.trim(); if(!/^\d{4}$/.test(val)){ document.getElementById('pinFieldErr').textContent='Use exatamente 4 dígitos'; return; } data.pinLock.enabled=true; data.pinLock.pin=val; __enhancedNeonvaultState.pinUnlocked=true; save(); toast('PIN salvo'); renderSettings(); };
  document.getElementById('reopenOnboarding').onclick=()=>{ data.onboardingSeen=false; save(); showWelcomeOnboarding(); };
  document.getElementById('exportMonthPdfBtn').onclick=exportMonthlyPdf;
}
const __oldRenderOverview = renderOverview;
renderOverview = function(){ __oldRenderOverview(); enhanceOverview(); };
const __oldRenderBudget = renderBudget;
renderBudget = function(){ __oldRenderBudget(); enhanceBudget(); };
const __oldRenderSettings = renderSettings;
renderSettings = function(){ __oldRenderSettings(); enhanceSettings(); };
const __oldShowTransactionModal = showTransactionModal;
showTransactionModal = function(type, subtype=null, tx=null){ __oldShowTransactionModal(type, subtype, tx); const desc=document.getElementById('txDesc'); const cat=document.getElementById('txCat'); if(desc && cat){ let manual=false; cat.addEventListener('change',()=>manual=true); desc.addEventListener('input',()=>{ const guess=suggestCategory(desc.value); if(guess && !manual && [...cat.options].some(o=>o.value===guess)) cat.value=guess; }); } };
const __oldRender = render;
render = function(){ ensureEnhancedData(); __oldRender(); if(data.pinLock?.enabled && !__enhancedNeonvaultState.pinUnlocked){ showPinGate(); } else if(!data.onboardingSeen && !__enhancedNeonvaultState.onboardingShown){ setTimeout(showWelcomeOnboarding, 50); } };

applyDark(); render();
</script>
</body>
</html>
